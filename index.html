<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: radial-gradient(circle, #0088cc 0%, #004466 100%); color: white; text-align: center; font-family: sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.2); }
        #ton-connect button { scale: 0.8; }
        .main { flex: 1; position: relative; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; }
        .active { display: flex !important; }
        h1 { font-size: 80px; margin: 10px 0; }
        #coin { font-size: 130px; cursor: pointer; user-select: none; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .card { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; width: 85%; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; margin: 5px 0; font-size: 14px; }
        .nav { height: 70px; display: flex; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.5; font-weight: bold; }
        .nav-btn.on { opacity: 1; color: #f7a80e; border-top: 3px solid #f7a80e; }
        .floating-text { position: absolute; color: #f7a80e; font-weight: bold; font-size: 30px; animation: moveUp 0.8s forwards; }
        @keyframes moveUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div class="header">
        <div style="background:rgba(255,255,255,0.1);padding:5px 12px;border-radius:12px;font-size:13px;" id="username">ID: Cargando...</div>
        <div id="ton-connect"></div>
    </div>
    <div class="main">
        <div id="t1" class="tab active">
            <p style="margin:0;opacity:0.7;">Puntos acumulados</p>
            <h1 id="score">0</h1>
            <div id="coin" onclick="clickCoin(event)">💎</div>
        </div>
        <div id="t2" class="tab">
            <div style="width:90%; max-height: 100%; overflow-y: auto;">
                <p style="color:#f7a80e; font-weight:bold; margin-top:20px;">TAREAS</p>
                <div class="card">
                    <button class="btn" style="background:#f7a80e;" onclick="comprarMejora()">MEJORA 0.1 TON</button>
                    <button class="btn" style="background:#28a745;color:white;" onclick="invitar()">INVITAR AMIGOS</button>
                    <button id="btn-mision" class="btn" style="background:#6f42c1;color:white;" onclick="mision()">CANAL (+200)</button>
                </div>
                <p style="color:#f7a80e; font-weight:bold;">TOP JUGADORES</p>
                <div class="card" id="ranking">Cargando...</div>
            </div>
        </div>
    </div>
    <div class="nav">
        <div id="b1" class="nav-btn on" onclick="ir('t1','b1')">MINAR 💎</div>
        <div id="b2" class="nav-btn" onclick="ir('t2','b2')">TAREAS 🏆</div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I", authDomain: "mytonclicker.firebaseapp.com", projectId: "mytonclicker", storageBucket: "mytonclicker.firebasestorage.app", messagingSenderId: "847124098754", appId: "1:847124098754:web:17c7f23ae15acdfef2155b" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const tg = window.Telegram.WebApp; tg.expand();
        const user = tg.initDataUnsafe?.user; const userId = user ? user.id.toString() : "local";
        if (user) document.getElementById('username').innerText = `ID: ${user.first_name}`;
        let pts = 0;
        let misionCompletada = false;

        window.ir = (t,b) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('on'));
            document.getElementById(t).classList.add('active');
            document.getElementById(b).classList.add('on');
        };

        async function load() {
            const d = await getDoc(doc(db, "jugadores", userId));
            if (d.exists()) { 
                pts = d.data().puntos || 0; 
                document.getElementById('score').innerText = pts; 
                misionCompletada = d.data().mision_canal || false;
                if (misionCompletada) {
                    const btn = document.getElementById('btn-mision');
                    btn.innerText = "CANAL COMPLETADO ✅";
                    btn.style.opacity = "0.5";
                }
            }
        }
        load();

        onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(5)), (s) => {
            const l = document.getElementById('ranking'); l.innerHTML = "";
            s.forEach((x) => { l.innerHTML += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);"><span>${x.data().nombre}</span><b>${x.data().puntos.toLocaleString()}</b></div>`; });
        });

        window.clickCoin = async (e) => {
            pts++; document.getElementById('score').innerText = pts;
            const f = document.createElement("div"); f.className = "floating-text"; f.innerText = "+1";
            f.style.left = e.clientX + "px"; f.style.top = e.clientY + "px";
            document.body.appendChild(f); setTimeout(() => f.remove(), 800);
            if (pts % 5 === 0) await setDoc(doc(db, "jugadores", userId), { nombre: user ? user.first_name : "Anon", puntos: pts }, { merge: true });
            if (navigator.vibrate) navigator.vibrate(40);
        };

        const tonUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://miguel800223-afk.github.io/mi-juego-ton/tonconnect-manifest.json', buttonRootId: 'ton-connect' });
        
        window.comprarMejora = async () => {
            try { await tonUI.sendTransaction({ validUntil: Math.floor(Date.now()/1000)+60, messages: [{ address: "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj", amount: "100000000" }] });
            pts += 1000; document.getElementById('score').innerText = pts; await setDoc(doc(db, "jugadores", userId), { puntos: pts }, { merge: true }); } catch(e){}
        };

        window.invitar = () => tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/TuBot&text=¡Únete!`);
        
        window.mision = async () => { 
            if (misionCompletada) return; // Si ya se hizo, no hace nada
            tg.openLink("https://t.me/TuCanal"); 
            pts += 200; 
            misionCompletada = true;
            document.getElementById('score').innerText = pts; 
            const btn = document.getElementById('btn-mision');
            btn.innerText = "CANAL COMPLETADO ✅";
            btn.style.opacity = "0.5";
            await setDoc(doc(db, "jugadores", userId), { puntos: pts, mision_canal: true }, { merge: true }); 
        };
    </script>
</body>
</html>
