<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker - Edición Élite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-oscuro: #030d17; --bg-tarjeta: rgba(255,255,255,0.05);
            --azul-ton: #0088cc; --cyan-neon: #00f2fe; --texto: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1); --oro: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-oscuro); color: var(--texto); 
            font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; 
            overflow: hidden; display: flex; flex-direction: column; 
        }

        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--card-border); }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; padding: 15px; overflow-y: auto; }
        .tab.active { display: flex; }

        /* RULETA */
        #wheel-container { position: relative; width: 280px; height: 280px; margin: 10px auto; }
        .pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 25px solid var(--oro); z-index: 10; 
        }
        #fortune-wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 8px solid #1a2a3a; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
            position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
            overflow: hidden;
        }
        .wheel-sector {
            position: absolute; width: 50%; height: 50%;
            top: 0; right: 0; transform-origin: 0% 100%;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-principal { 
            width: 90%; padding: 12px; border-radius: 25px; border: none; 
            background: linear-gradient(180deg, var(--azul-ton), #005588); 
            color: white; font-weight: 800; cursor: pointer; margin: 8px 0;
        }
        .btn-secundario {
            width: 100%; padding: 12px; border-radius: 15px; border: 1px solid var(--card-border);
            background: var(--bg-tarjeta); color: white; margin-bottom: 10px; font-size: 13px; text-align: left;
        }

        .energy-bar-bg { width: 90%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffee00); transition: width 0.5s; }

        .rank-card { display: flex; justify-content: space-between; width: 100%; padding: 12px; background: var(--bg-tarjeta); margin-bottom: 8px; border-radius: 12px; border: 1px solid transparent; }
        .rank-me { border-color: var(--azul-ton); background: rgba(0, 136, 204, 0.15); }

        .card-inbox { width: 100%; background: white; border-radius: 12px; padding: 15px; display: flex; margin-bottom: 10px; color: #333; }
        .check-inbox { background: #8c5af5; border-radius: 50%; color: white; min-width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; margin-right: 12px;}

        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 10px; color: white; cursor: pointer;}
        .nav-btn.on { opacity: 1; color: var(--azul-ton); border-top: 3px solid var(--azul-ton); }
    </style>
</head>
<body>

    <div class="header">
        <div id="username">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <h3 style="color: var(--oro);">🏆 TOP MUNDIAL</h3>
            <div id="ranking-list" style="width:100%"></div>
        </div>

        <div id="t1" class="tab active">
            <div style="display: flex; gap: 20px; margin: 10px 0;">
                <div>💰 <span id="score">0</span></div>
                <div>🎫 <span id="user-tickets">0</span></div>
            </div>

            <div id="wheel-container">
                <div class="pointer"></div>
                <div id="fortune-wheel"></div>
            </div>

            <button class="btn-principal" id="spin-btn" onclick="startSpin()">GIRAR (1 ⚡)</button>
            <div style="font-size: 13px; margin-top: 10px; font-weight: 600;">⚡ Energía: <span id="energy-text">0/50</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <div id="timer-text" style="font-size: 10px; color: #aaa; margin-top: 5px;">Sincronizando...</div>
        </div>

        <div id="t2" class="tab">
            <h3>TAREAS Y RECOMPENSAS</h3>
            <button class="btn-principal" style="background: #e91e63; margin-bottom: 20px;" onclick="triggerAd()">🎬 VER VIDEO (+1 TICKET)</button>
            
            <div style="width: 100%; padding: 0 10px;">
                <h4 style="margin-bottom: 10px;">🛒 Tienda de Energía</h4>
                <button class="btn-secundario" onclick="buyEnergy()">🪙 100 Puntos <span style="float:right">→ +10 ⚡</span></button>
                <button class="btn-secundario" onclick="buyTickets()">💎 500 Puntos <span style="float:right">→ +5 🎫</span></button>
                
                <h4 style="margin: 20px 0 10px;">👥 Crecimiento</h4>
                <button class="btn-secundario" onclick="copyInvite()">🔗 Copiar mi Link de Referido</button>
            </div>
        </div>

        <div id="t3" class="tab">
            <h2>📩 MI BUZÓN</h2>
            <div id="inbox-list" style="width: 100%;">
                <div class="card-inbox">
                    <div class="check-inbox">👥</div>
                    <div>
                        <b>Sistema de Invitados</b><br>
                        <span id="referral-count">Tienes 0 referidos activos</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn" onclick="showTab('t0', this)">🏆 TOP</div>
        <div class="nav-btn on" onclick="showTab('t1', this)">🎮 JUEGO</div>
        <div class="nav-btn" onclick="showTab('t2', this)">✅ TAREAS</div>
        <div class="nav-btn" onclick="showTab('t3', this)">📩 INBOX</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURACIÓN (REEMPLAZA CON TUS DATOS)
        const firebaseConfig = { apiKey: "API_KEY", projectId: "PROY_ID", appId: "APP_ID" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let pts = 0, tickets = 0, energiaActual = 0, maxEnergia = 50, referidos = 0;
        let lastSyncTime = Date.now();
        let rotationActual = 0;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Usuario";

        const PREMIOS = [
            { tipo: 'puntos', valor: 50, color: '#030d17', icono: '💎' },
            { tipo: 'tickets', valor: 1, color: '#f59e0b', icono: '🎫' },
            { tipo: 'puntos', valor: 100, color: '#030d17', icono: '💎' },
            { tipo: 'nada', valor: 0, color: '#1a2a3a', icono: '❌' },
            { tipo: 'puntos', valor: 200, color: '#030d17', icono: '💎' },
            { tipo: 'jackpot', valor: 5000, color: '#ff0000', icono: '🏆' }, // JACKPOT 1%
            { tipo: 'puntos', valor: 10, color: '#030d17', icono: '💎' },
            { tipo: 'nada', valor: 0, color: '#1a2a3a', icono: '❌' }
        ];

        // --- ENERGÍA (RECARGA CADA 25 MIN Y ACUMULABLE) ---
        function updateEnergyLogic() {
            const msPorUnidad = 25 * 60 * 1000; 
            const ahora = Date.now();
            const transcurrido = ahora - lastSyncTime;

            if (energiaActual < maxEnergia) {
                const ganada = Math.floor(transcurrido / msPorUnidad);
                if (ganada > 0) {
                    energiaActual = Math.min(maxEnergia, energiaActual + ganada);
                    lastSyncTime = ahora - (transcurrido % msPorUnidad);
                    saveData();
                }
                const faltante = msPorUnidad - (transcurrido % msPorUnidad);
                const m = Math.floor(faltante / 60000);
                const s = Math.floor((faltante % 60000) / 1000);
                document.getElementById('timer-text').innerText = `+1 Energía en: ${m}:${s < 10 ? '0' : ''}${s}`;
            } else {
                document.getElementById('timer-text').innerText = energiaActual > maxEnergia ? "Modo Acumulación Activo ⚡" : "Energía al Máximo";
                lastSyncTime = ahora;
            }
            updateUI();
        }

        // --- RULETA ---
        window.startSpin = () => {
            if (energiaActual < 1) { tg.showAlert("¡No tienes energía!"); return; }
            energiaActual -= 1;
            
            const azar = Math.random();
            let indexGanador;
            if (azar < 0.01) indexGanador = 5; // Dificultad Jackpot
            else indexGanador = [0, 1, 2, 3, 4, 6, 7][Math.floor(Math.random() * 7)];

            const anguloSector = 360 / PREMIOS.length;
            rotationActual += (360 * 10) + (360 - (indexGanador * anguloSector) - (anguloSector / 2));
            document.getElementById('fortune-wheel').style.transform = `rotate(${rotationActual}deg)`;
            
            setTimeout(() => {
                const p = PREMIOS[indexGanador];
                if(p.tipo === 'puntos' || p.tipo === 'jackpot') pts += p.valor;
                if(p.tipo === 'tickets') tickets += p.valor;
                tg.showAlert(`¡${p.icono} ${p.tipo === 'nada' ? 'Casi ganas' : p.valor}!`);
                saveData();
            }, 4000);
        };

        // --- TIENDA ---
        window.buyEnergy = () => {
            if (pts >= 100) { pts -= 100; energiaActual += 10; tg.showAlert("¡Energía acumulada!"); saveData(); updateUI(); }
            else tg.showAlert("Faltan puntos.");
        };

        window.buyTickets = () => {
            if (pts >= 500) { pts -= 500; tickets += 5; tg.showAlert("¡Tickets comprados!"); saveData(); updateUI(); }
            else tg.showAlert("Faltan puntos.");
        };

        // --- ANUNCIOS ---
        window.triggerAd = () => {
            if (!window.Adsgram) { tg.showAlert("Anuncio no listo."); return; }
            const Ad = window.Adsgram.init({ blockId: "27310" });
            Ad.show().then(r => { if(r.done) { tickets += 1; saveData(); updateUI(); } });
        };

        // --- REFERIDOS ---
        window.copyInvite = () => {
            const link = `https://t.me/TuBot?start=${userId}`;
            navigator.clipboard.writeText(link);
            tg.showAlert("¡Link copiado!");
        };

        // --- UI ---
        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts).toLocaleString();
            document.getElementById('user-tickets').innerText = tickets;
            document.getElementById('energy-text').innerText = `${energiaActual}/${maxEnergia}`;
            document.getElementById('referral-count').innerText = `Tienes ${referidos} referidos activos`;
            const fill = document.getElementById('energy-fill');
            fill.style.width = `${Math.min((energiaActual / maxEnergia) * 100, 100)}%`;
            fill.style.background = energiaActual > maxEnergia ? "var(--cyan-neon)" : "linear-gradient(90deg, #ffcc00, #ffee00)";
        }

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('on');
        };

        async function saveData() {
            await setDoc(doc(db, "jugadores", userId), { 
                nombre: firstName, puntos: pts, tickets: tickets, energia: energiaActual, lastSeen: lastSyncTime 
            }, { merge: true });
        }

        window.onload = async () => {
            document.getElementById('username').innerText = firstName;
            dibujarRuleta();
            const d = await getDoc(doc(db, "jugadores", userId));
            if(d.exists()) {
                const data = d.data();
                pts = data.puntos || 0; tickets = data.tickets || 0;
                energiaActual = data.energia ?? 10; lastSyncTime = data.lastSeen || Date.now();
                referidos = data.referidos || 0;
            }
            setInterval(updateEnergyLogic, 1000);
            loadRanking();
        };

        function dibujarRuleta() {
            const wheel = document.getElementById('fortune-wheel');
            PREMIOS.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'wheel-sector';
                div.style.backgroundColor = p.color;
                div.style.transform = `rotate(${i * 45}deg) skewY(-45deg)`;
                const span = document.createElement('span');
                span.innerText = p.icono;
                span.style.transform = `skewY(45deg) rotate(22deg)`;
                span.style.position = 'absolute'; span.style.top = '30px'; span.style.fontWeight = "800";
                div.appendChild(span); wheel.appendChild(div);
            });
        }

        function loadRanking() {
            onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(50)), (snap) => {
                const list = document.getElementById('ranking-list');
                list.innerHTML = "";
                let i = 1;
                snap.forEach(d => {
                    const data = d.data();
                    const isMe = d.id === userId;
                    list.innerHTML += `<div class="rank-card ${isMe ? 'rank-me' : ''}"><span><b>#${i}</b> ${data.nombre || 'Player'}</span><b>💰 ${Math.floor(data.puntos)}</b></div>`;
                    i++;
                });
            });
        }
    </script>
</body>
</html>
