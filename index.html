<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { 
            background: radial-gradient(circle, #0088cc 0%, #004466 100%); 
            color: white; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; 
        }

        /* Contenedor de la parte superior */
        .header {
            position: absolute; top: 15px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box;
        }

        .user-info { 
            background: rgba(255,255,255,0.1); padding: 5px 12px; 
            border-radius: 12px; font-size: 14px; border: 1px solid rgba(255,255,255,0.2);
        }

        /* Ajuste para que el botón de wallet no se vea gigante */
        #ton-connect button { scale: 0.8; transform-origin: right; }

        h1 { font-size: 75px; margin: 10px 0; text-shadow: 0 4px 15px rgba(0,0,0,0.4); font-weight: 800; }
        
        #coin { 
            font-size: 130px; cursor: pointer; transition: transform 0.1s; 
            display: inline-block; user-select: none; margin: 10px 0; 
            filter: drop-shadow(0 0 20px rgba(0, 136, 204, 0.8)); 
            animation: float 3s ease-in-out infinite; 
        }

        @keyframes float { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-20px); } 
        }

        #coin:active { transform: scale(0.85); }

        .floating-text { 
            position: absolute; color: #f7a80e; font-weight: bold; 
            font-size: 28px; pointer-events: none; 
            animation: moveUp 0.8s ease-out forwards; text-shadow: 1px 1px 5px black;
        }

        @keyframes moveUp { 
            from { opacity: 1; transform: translateY(0); } 
            to { opacity: 0; transform: translateY(-120px); } 
        }

        .btn-compra { 
            margin-top: 10px; padding: 12px 20px; background: #f7a80e; 
            border: none; border-radius: 15px; color: black; 
            font-weight: bold; cursor: pointer; font-size: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s;
        }

        .btn-compra:active { transform: scale(0.95); }

        .ranking-container { 
            background: rgba(0, 0, 0, 0.3); border-radius: 20px; 
            padding: 15px; width: 85%; max-width: 320px; 
            margin-top: 25px; border: 1px solid rgba(255,255,255,0.1);
        }

        .ranking-title { 
            font-weight: bold; margin-bottom: 12px; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            padding-bottom: 8px; font-size: 18px; color: #f7a80e;
        }

        .ranking-item { 
            display: flex; justify-content: space-between; 
            font-size: 15px; margin: 8px 0; padding: 0 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <span id="username">Cargando...</span>
        </div>
        <div id="ton-connect"></div>
    </div>

    <p style="margin-top: 60px; margin-bottom: 0; opacity: 0.8;">Puntos acumulados</p>
    <h1 id="score">0</h1>
    
    <div id="coin" onclick="clickCoin(event)">💎</div>

    <button class="btn-compra" onclick="comprarMejora()">
        Comprar Mejora (0.1 TON)
    </button>

    <div class="ranking-container">
        <div class="ranking-title">🏆 TOP JUGADORES</div>
        <div id="lista-ranking">Cargando ranking...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I",
            authDomain: "mytonclicker.firebaseapp.com",
            projectId: "mytonclicker",
            storageBucket: "mytonclicker.firebasestorage.app",
            messagingSenderId: "847124098754",
            appId: "1:847124098754:web:17c7f23ae15acdfef2155b",
            measurementId: "G-SRHQ8CS0JT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id.toString() : "usuario_local";
        
        if (user) {
            document.getElementById('username').innerText = `ID: ${user.first_name}`;
        }

        let count = 0;

        async function cargarPuntos() {
            const docRef = doc(db, "jugadores", userId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                count = docSnap.data().puntos || 0;
                document.getElementById('score').innerText = count;
            }
        }
        cargarPuntos();

        const q = query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(5));
        onSnapshot(q, (snapshot) => {
            const listaHtml = document.getElementById('lista-ranking');
            listaHtml.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                listaHtml.innerHTML += `
                    <div class="ranking-item">
                        <span>${data.nombre || "Anónimo"}</span>
                        <b>${data.puntos.toLocaleString()}</b>
                    </div>`;
            });
        });

        window.clickCoin = async function(e) {
            count++;
            document.getElementById('score').innerText = count;

            const floating = document.createElement("div");
            floating.innerText = "+1";
            floating.className = "floating-text";
            floating.style.left = (e.clientX || window.innerWidth / 2) + "px";
            floating.style.top = (e.clientY || window.innerHeight / 2) + "px";
            document.body.appendChild(floating);
            setTimeout(() => floating.remove(), 800);
            
            if (count % 5 === 0) {
                await setDoc(doc(db, "jugadores", userId), {
                    nombre: user ? user.first_name : "Anónimo",
                    puntos: count
                }, { merge: true });
            }
            if (navigator.vibrate) navigator.vibrate(40);
        }

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://miguel800223-afk.github.io/mi-juego-ton/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        window.comprarMejora = async function() {
            if (!tonConnectUI.connected) {
                alert("Primero conecta tu billetera arriba.");
                return;
            }
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [{
                    address: "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj",
                    amount: "100000000"
                }]
            };
            try {
                await tonConnectUI.sendTransaction(transaction);
                count += 1000;
                document.getElementById('score').innerText = count;
                await setDoc(doc(db, "jugadores", userId), { puntos: count }, { merge: true });
                alert("¡Compra exitosa! +1000 puntos.");
            } catch (e) {
                alert("Pago no realizado.");
            }
        }
    </script>
</body>
</html>
