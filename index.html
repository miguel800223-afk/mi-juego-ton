<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/sdk-v1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-bg: #031525; --ton-blue: #0088cc; --text-color: #ffffff; --card-border: rgba(255, 255, 255, 0.1); --futuristic-glow: #00f2fe; --accent-gold: #f59e0b; }
        body { background-color: var(--primary-bg); color: var(--text-color); text-align: center; font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; }
        .header { height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid var(--card-border); }
        #username { background: rgba(0, 136, 204, 0.2); padding: 6px 15px; border-radius: 20px; font-size: 13px; color: var(--ton-blue); font-weight: 600; }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; padding-top: 20px; }
        .tab.active { display: flex !important; }
        .scroll-container { width: 92%; height: 85%; overflow-y: auto; padding-bottom: 20px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--card-border); }
        #coin-container { width: 220px; height: 220px; cursor: pointer; touch-action: manipulation; transition: transform 0.05s; margin: 30px auto; background: radial-gradient(circle, #00f2fe 0%, #0088cc 100%); border-radius: 50%; border: 8px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0, 136, 204, 0.5); display: flex; align-items: center; justify-content: center; font-size: 70px; }
        #coin-container:active { transform: scale(0.90); }
        .energy-bar-bg { width: 80%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px auto; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--ton-blue), var(--futuristic-glow)); transition: width 0.2s; }
        .task-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; text-align: left; border: 1px solid var(--card-border); }
        .btn { padding: 10px 18px; border-radius: 20px; border: none; font-weight: 700; color: #fff; cursor: pointer; font-size: 11px; }
        .btn-ads { background: linear-gradient(90deg, #6f42c1, #a176ff); width: 100%; padding: 15px; font-size: 14px; margin-bottom: 15px; }
        .nav { height: 75px; display: flex; background: #04101d; border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; font-size: 11px; color: white; cursor: pointer; }
        .nav-btn.on { opacity: 1; color: var(--futuristic-glow); border-top: 3px solid var(--futuristic-glow); }
        .floating-text { position: absolute; color: white; font-weight: 800; font-size: 32px; pointer-events: none; animation: moveUp 0.6s forwards; z-index: 10; }
        @keyframes moveUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div class="header">
        <div id="username">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <div class="scroll-container" id="ranking-list">Cargando ranking...</div>
        </div>

        <div id="t1" class="tab active">
            <h1 style="font-size: 2.8rem; margin: 10px 0;"><span id="score">0</span></h1>
            <div id="coin-container" onclick="handleCoinClick(event)">⚡</div>
            <div style="font-weight: 600;">⚡ <span id="energy-text">500/500</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>

        <div id="t2" class="tab">
            <div class="scroll-container">
                <button class="btn btn-ads" id="ad-btn" onclick="triggerAd()">🎬 VIDEO (+250 ENERGÍA)</button>
                <div class="task-card"><div>Unirse al Canal<br><b style="color:var(--accent-gold)">+5,000 Puntos</b></div><button class="btn" style="background:var(--ton-blue)" onclick="claim('canal')">IR</button></div>
                <div class="task-card"><div>Invitar Amigos<br><b style="color:var(--accent-gold)">+2,500 Puntos</b></div><button class="btn" style="background:var(--ton-blue)" onclick="claim('ref')">INVITAR</button></div>
                <div class="task-card"><div>Mejorar Clic (Nvl <span id="click-lvl">1</span>)<br><b style="color:var(--accent-gold)">Mejora tu minado</b></div><button class="btn" style="background:#f7a80e" onclick="pay('upgrade')">0.05 TON</button></div>
                <div class="task-card"><div>Pack Diamante<br><b style="color:var(--accent-gold)">+50,000 Puntos</b></div><button class="btn" style="background:#22c55e" onclick="pay('pack')">0.5 TON</button></div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="b0" class="nav-btn" onclick="ir('t0','b0')">🏆 TOP</div>
        <div id="b1" class="nav-btn on" onclick="ir('t1','b1')">⚡ MINAR</div>
        <div id="b2" class="nav-btn" onclick="ir('t2','b2')">✅ TAREAS</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I", authDomain: "mytonclicker.firebaseapp.com", projectId: "mytonclicker", storageBucket: "mytonclicker.firebasestorage.app", messagingSenderId: "847124098754", appId: "1:847124098754:web:17c7f23ae15acdfef2155b" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp; 
        tg.expand();

        let pts = 0, nivelClic = 1, energiaActual = 500, maxEnergia = 500;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Jugador";

        window.ir = (t, b) => { 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('on'));
            document.getElementById(t).classList.add('active'); document.getElementById(b).classList.add('on');
        };

        window.handleCoinClick = (e) => {
            if (energiaActual < nivelClic) { tg.HapticFeedback.notificationOccurred('error'); return; }
            pts += nivelClic; energiaActual -= nivelClic; 
            updateUI();
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            const f = document.createElement("div"); f.className = "floating-text"; f.innerText = `+${nivelClic}`;
            f.style.left = `${x-20}px`; f.style.top = `${y-40}px`; document.body.appendChild(f);
            setTimeout(() => f.remove(), 600); tg.HapticFeedback.impactOccurred('medium');
        };

        window.triggerAd = () => {
            const adBtn = document.getElementById('ad-btn');
            if (!window.Adsgram) { tg.showAlert("Cargando anuncios..."); return; }
            adBtn.disabled = true; adBtn.innerText = "Conectando...";
            const AdsgramController = window.Adsgram.init({ blockId: "27310" });
            AdsgramController.show().then(res => {
                if(res.done) { 
                    energiaActual = Math.min(energiaActual + 250, maxEnergia); 
                    updateUI();
                    saveData();
                    tg.showAlert("¡+250 Energía!"); 
                }
            }).catch(() => tg.showAlert("Anuncio no disponible."))
            .finally(() => { adBtn.disabled = false; adBtn.innerText = "🎬 VIDEO (+250 ENERGÍA)"; });
        };

        window.claim = (type) => {
            if(type === 'canal') { tg.openTelegramLink('https://t.me/+eMrzkqBJInk3MTkx'); pts += 5000; } 
            else { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/SuperTonClicker_bot?start=${userId}&text=¡Gana TON!`); }
            updateUI(); saveData();
        };

        window.pay = (t) => tg.showAlert("Conecta tu wallet para procesar el pago.");

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(energiaActual)}/${maxEnergia}`;
            document.getElementById('energy-fill').style.width = `${(energiaActual/maxEnergia)*100}%`;
            document.getElementById('click-lvl').innerText = nivelClic;
        }

        async function saveData() { 
            try { 
                await setDoc(doc(db, "jugadores", userId), { 
                    nombre: firstName, 
                    puntos: pts, 
                    nivelClic: nivelClic, 
                    energia: energiaActual, 
                    lastSeen: serverTimestamp() 
                }, { merge: true }); 
            } catch(e){ console.error("Error al guardar:", e); } 
        }

        window.onload = async () => {
            document.getElementById('username').innerText = firstName;
            
            // Carga de datos inicial
            try {
                const d = await getDoc(doc(db, "jugadores", userId));
                if(d.exists()) { 
                    const data = d.data(); 
                    pts = data.puntos || 0; 
                    nivelClic = data.nivelClic || 1; 
                    // Si existe energía guardada, la cargamos. Si no, le damos el max.
                    energiaActual = (data.energia !== undefined) ? data.energia : maxEnergia;
                } else {
                    energiaActual = maxEnergia; // Nuevo usuario
                    await saveData();
                }
            } catch(e) {
                console.error("Error al cargar:", e);
                energiaActual = maxEnergia;
            }
            
            updateUI();

            if(window.TON_CONNECT_UI) {
                new TON_CONNECT_UI.TonConnectUI({ 
                    manifestUrl: 'https://miguel800223-afk.github.io/mi-juego-ton/tonconnect-manifest.json', 
                    buttonRootId: 'ton-connect' 
                });
            }

            // --- RECARGA DE ENERGÍA Y GUARDADO ---
            setInterval(() => { 
                if(energiaActual < maxEnergia) { 
                    energiaActual = Math.min(energiaActual + 1.2, maxEnergia); 
                    updateUI(); 
                } 
            }, 1000);

            setInterval(saveData, 15000); // Guardado automático cada 15s

            // --- RANKING CORREGIDO (Escucha en tiempo real) ---
            const rankingQuery = query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(20));
            onSnapshot(rankingQuery, (snapshot) => {
                const list = document.getElementById('ranking-list');
                if(!list) return;
                list.innerHTML = "<h2 style='margin-bottom:20px'>🏆 Top Líderes</h2>";
                let i = 1;
                snapshot.forEach(doc => {
                    const d = doc.data();
                    if(d && d.nombre) {
                        list.innerHTML += `
                            <div class="rank-item">
                                <span>#${i} ${d.nombre}</span>
                                <b>${Math.floor(d.puntos || 0).toLocaleString()}</b>
                            </div>`;
                        i++;
                    }
                });
            }, (error) => {
                console.error("Error en ranking:", error);
            });
        };
    </script>
</body>
</html>
