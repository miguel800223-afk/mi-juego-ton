<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0088cc; color: white; text-align: center; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden; }
        .user-info { position: absolute; top: 10px; left: 10px; font-size: 14px; text-align: left; }
        h1 { font-size: 80px; margin: 10px 0; }
        #coin { font-size: 150px; cursor: pointer; transition: transform 0.1s; display: inline-block; user-select: none; }
        #coin:active { transform: scale(0.8); }
        #ton-connect { display: flex; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="user-info">
        <span id="username">Cargando jugador...</span>
    </div>

    <p>Puntos acumulados</p>
    <h1 id="score">0</h1>
    
    <div id="coin" onclick="clickCoin()">💎</div>

    <p>¡TOCA PARA GANAR!</p>
    
    <div id="ton-connect"></div>

    <script type="module">
        // Importamos Firebase desde la web
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Tus datos reales de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I",
            authDomain: "mytonclicker.firebaseapp.com",
            projectId: "mytonclicker",
            storageBucket: "mytonclicker.firebasestorage.app",
            messagingSenderId: "847124098754",
            appId: "1:847124098754:web:17c7f23ae15acdfef2155b",
            measurementId: "G-SRHQ8CS0JT"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id.toString() : "usuario_local";

        if (user) {
            document.getElementById('username').innerText = `Jugador: ${user.first_name}`;
        }

        let count = 0;

        // 1. Cargar puntos desde Firebase al abrir el juego
        async function cargarPuntos() {
            try {
                const docRef = doc(db, "jugadores", userId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    count = docSnap.data().puntos || 0;
                    document.getElementById('score').innerText = count;
                }
            } catch (e) {
                console.error("Error al cargar:", e);
            }
        }
        cargarPuntos();

        // 2. Función para ganar puntos y guardar en la nube
        window.clickCoin = async function() {
            count++;
            document.getElementById('score').innerText = count;
            
            // Guardar en la nube cada 5 clics
            if (count % 5 === 0) {
                try {
                    await setDoc(doc(db, "jugadores", userId), {
                        nombre: user ? user.first_name : "Anónimo",
                        puntos: count,
                        ultima_actualizacion: new Date()
                    }, { merge: true });
                } catch (e) {
                    console.error("Error al guardar:", e);
                }
            }
            
            if (navigator.vibrate) navigator.vibrate(50);
        }

        // 3. Conexión de billetera (lo que ya tenías funcionando)
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://miguel800223-afk.github.io/mi-juego-ton/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
    </script>
</body>
</html>
