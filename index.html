<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker - Fix Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-oscuro: #030d17; --bg-tarjeta: rgba(255,255,255,0.05);
            --azul-ton: #0088cc; --cyan-neon: #00f2fe; --texto: #ffffff;
            --oro: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-oscuro); color: var(--texto); font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; padding: 15px; overflow-y: auto; }
        .tab.active { display: flex; }
        
        /* RULETA - POSICIONAMIENTO MEJORADO */
        #wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--oro); z-index: 100; }
        #fortune-wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #1a2a3a; position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); overflow: hidden; }
        .wheel-sector { position: absolute; width: 50%; height: 50%; top: 0; right: 0; transform-origin: 0% 100%; display: flex; align-items: center; justify-content: center; }
        .wheel-icon { position: absolute; left: 15px; bottom: 35px; font-size: 22px; transform: skewY(45deg) rotate(22.5deg); }

        .btn-principal { width: 90%; padding: 14px; border-radius: 25px; border: none; background: linear-gradient(180deg, var(--azul-ton), #005588); color: white; font-weight: 800; cursor: pointer; margin: 8px 0; }
        .btn-secundario { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-tarjeta); color: white; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .energy-bar-bg { width: 90%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
        #energy-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffee00); transition: width 0.5s; }
        
        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 10px; color: white; cursor: pointer;}
        .nav-btn.on { opacity: 1; color: var(--azul-ton); border-top: 3px solid var(--azul-ton); }
    </style>
</head>
<body>

    <div class="header">
        <div id="username" style="font-weight: 800;">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t1" class="tab active">
            <div style="display: flex; gap: 20px; margin: 10px 0; font-size: 18px; font-weight: 800;">
                <div>💰 <span id="score">0</span></div>
                <div>🎫 <span id="user-tickets">0</span></div>
            </div>
            <div id="wheel-container">
                <div class="pointer"></div>
                <div id="fortune-wheel"></div>
            </div>
            <button class="btn-principal" onclick="startSpin()">GIRAR (1 ⚡)</button>
            <div style="font-size: 14px; margin-top: 10px;">⚡ Energía: <span id="energy-text">0/50</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <div id="timer-text" style="font-size: 11px; color: #aaa; margin-top: 5px;">Sincronizando...</div>
        </div>

        <div id="t2" class="tab">
            <h3>MISIONES DISPONIBLES</h3>
            <div style="width: 100%; padding: 0 10px;">
                <div class="btn-secundario" id="task-wallet">
                    <span>🔗 Conectar Wallet</span>
                    <b id="wallet-badge" style="color: var(--oro);">+10 ⚡</b>
                </div>
                <div class="btn-secundario" style="opacity: 0.8;">
                    <span>🎁 Bono Inicial</span>
                    <b style="color: #4caf50;">✅ ACTIVADO</b>
                </div>
            </div>
        </div>

        <div id="t0" class="tab">
            <h3>🏆 LÍDERES</h3>
            <div id="ranking-list" style="width:100%"></div>
        </div>

        <div id="t3" class="tab">
            <h3>📩 INBOX</h3>
            <div style="width:100%; background:white; color:#333; padding:15px; border-radius:15px; display:flex; align-items:center;">
                <span style="font-size:30px; margin-right:15px;">🎁</span>
                <div><b>¡Bienvenido!</b><br>Se han sumado 50 de energía a tu cuenta.</div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn" onclick="showTab('t0', this)">🏆 TOP</div>
        <div class="nav-btn on" onclick="showTab('t1', this)">🎮 JUEGO</div>
        <div class="nav-btn" onclick="showTab('t2', this)">✅ TAREAS</div>
        <div class="nav-btn" onclick="showTab('t3', this)">📩 INBOX</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { apiKey: "AIza...", projectId: "...", appId: "..." };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let pts = 0, tickets = 0, energiaActual = 0, lastSyncTime = Date.now();
        let walletBonusClaimed = false, rotationActual = 0;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "test_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Usuario";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://tu-sitio.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const PREMIOS = [
            { icono: '💎', color: '#030d17', valor: 50 },
            { icono: '🎫', color: '#f59e0b', valor: 1 },
            { icono: '💰', color: '#030d17', valor: 100 },
            { icono: '❌', color: '#1a2a3a', valor: 0 },
            { icono: '💎', color: '#030d17', valor: 200 },
            { icono: '🏆', color: '#ff0000', valor: 5000 },
            { icono: '💰', color: '#030d17', valor: 10 },
            { icono: '❌', color: '#1a2a3a', valor: 0 }
        ];

        // --- CARGA DE DATOS ---
        async function loadUserData() {
            const userRef = doc(db, "jugadores", userId);
            const d = await getDoc(userRef);
            
            if (!d.exists()) {
                // SI ES NUEVO, ASIGNAR 50 DE ENERGÍA Y GUARDAR
                energiaActual = 50;
                pts = 0; tickets = 0;
                walletBonusClaimed = false;
                await setDoc(userRef, { 
                    nombre: firstName, puntos: pts, tickets: tickets, 
                    energia: energiaActual, lastSeen: Date.now(), walletBonus: false 
                });
            } else {
                const dat = d.data();
                pts = dat.puntos || 0;
                tickets = dat.tickets || 0;
                energiaActual = dat.energia ?? 0;
                lastSyncTime = dat.lastSeen || Date.now();
                walletBonusClaimed = dat.walletBonus || false;
            }
            updateUI();
        }

        // --- TAREA WALLET ---
        tonConnectUI.onStatusChange(async (wallet) => {
            if (wallet && !walletBonusClaimed) {
                energiaActual += 10;
                walletBonusClaimed = true;
                await saveData();
                tg.showAlert("✅ ¡Tarea de Wallet completada! +10 Energía.");
                updateUI();
            }
        });

        // --- LÓGICA DE JUEGO ---
        window.startSpin = async () => {
            if (energiaActual < 1) { tg.showAlert("Sin energía"); return; }
            energiaActual--;
            updateUI();
            
            let index = Math.random() < 0.01 ? 5 : [0,1,2,3,4,6,7][Math.floor(Math.random()*7)];
            rotationActual += (360 * 5) + (360 - (index * 45) - 22.5);
            document.getElementById('fortune-wheel').style.transform = `rotate(${rotationActual}deg)`;
            
            setTimeout(async () => {
                const p = PREMIOS[index];
                if (index === 1) tickets += p.valor;
                else pts += p.valor;
                if(p.valor > 0) tg.showAlert(`¡Ganaste ${p.valor}!`);
                await saveData();
            }, 4000);
        };

        function updateEnergy() {
            const ms = 25 * 60 * 1000;
            const ahora = Date.now();
            if (energiaActual < 50) {
                const ganada = Math.floor((ahora - lastSyncTime) / ms);
                if (ganada > 0) {
                    energiaActual = Math.min(50, energiaActual + ganada);
                    lastSyncTime = ahora - ((ahora - lastSyncTime) % ms);
                    saveData();
                }
            }
            updateUI();
        }

        async function saveData() {
            await setDoc(doc(db, "jugadores", userId), { 
                nombre: firstName, puntos: pts, tickets: tickets, 
                energia: energiaActual, lastSeen: lastSyncTime, walletBonus: walletBonusClaimed 
            }, { merge: true });
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts);
            document.getElementById('user-tickets').innerText = tickets;
            document.getElementById('energy-text').innerText = `${energiaActual}/50`;
            document.getElementById('energy-fill').style.width = `${(energiaActual/50)*100}%`;
            document.getElementById('username').innerText = firstName;
            if(walletBonusClaimed) {
                document.getElementById('wallet-badge').innerText = "✅";
                document.getElementById('task-wallet').style.opacity = "0.6";
            }
        }

        function dibujarRuleta() {
            const wheel = document.getElementById('fortune-wheel');
            wheel.innerHTML = "";
            PREMIOS.forEach((p, i) => {
                const sector = document.createElement('div');
                sector.className = 'wheel-sector';
                sector.style.backgroundColor = p.color;
                sector.style.transform = `rotate(${i * 45}deg) skewY(-45deg)`;
                const icon = document.createElement('div');
                icon.className = 'wheel-icon';
                icon.innerText = p.icono;
                sector.appendChild(icon);
                wheel.appendChild(sector);
            });
        }

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('on');
        };

        window.onload = () => {
            dibujarRuleta();
            loadUserData();
            setInterval(updateEnergy, 5000);
        };
    </script>
</body>
</html>
