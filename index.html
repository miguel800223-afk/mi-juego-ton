<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker - Pro Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-oscuro: #030d17; --bg-tarjeta: rgba(255,255,255,0.05);
            --azul-ton: #0088cc; --cyan-neon: #00f2fe; --texto: #ffffff;
            --oro: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-oscuro); color: var(--texto); font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; padding: 15px; overflow-y: auto; }
        .tab.active { display: flex; }
        
        #wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 35px solid var(--oro); z-index: 100; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        #fortune-wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #1a2a3a; position: relative; transition: transform 4s cubic-bezier(0.2, 0.9, 0.3, 1.1); overflow: hidden; box-shadow: 0 0 20px rgba(0,136,204,0.3); }
        .wheel-sector { position: absolute; width: 50%; height: 50%; top: 0; right: 0; transform-origin: 0% 100%; display: flex; align-items: center; justify-content: center; }
        .wheel-icon { position: absolute; left: 25px; bottom: 50px; font-size: 28px; transform: skewY(45deg) rotate(22.5deg); text-shadow: 0 0 5px black; }

        .btn-principal { width: 90%; padding: 14px; border-radius: 25px; border: none; background: linear-gradient(180deg, var(--azul-ton), #005588); color: white; font-weight: 800; cursor: pointer; margin: 8px 0; transition: transform 0.1s; font-size: 16px; }
        .btn-principal:active { transform: scale(0.95); }
        .btn-secundario { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-tarjeta); color: white; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-secundario:active { background: rgba(255,255,255,0.1); }
        
        .energy-bar-bg { width: 90%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin: 5px 0; }
        #energy-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffee00); transition: width 0.3s; }
        
        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 12px; color: white; cursor: pointer; transition: all 0.2s; gap: 5px; }
        .nav-btn.on { opacity: 1; color: var(--azul-ton); border-top: 3px solid var(--azul-ton); background: rgba(0,136,204,0.1); }
        
        .toast-notification { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #ffcc00; padding: 10px 20px; border-radius: 30px; font-size: 14px; z-index: 1000; animation: fadeOut 2s forwards; pointer-events: none; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>

    <div class="header">
        <div id="username" style="font-weight: 800;">...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t1" class="tab active">
            <div style="display: flex; gap: 20px; margin: 10px 0; font-size: 20px; font-weight: 800;">
                <div>💰 <span id="score">0</span></div>
                <div>🎫 <span id="user-tickets">0</span></div>
            </div>
            <div id="wheel-container">
                <div class="pointer"></div>
                <div id="fortune-wheel"></div>
            </div>
            <button id="spin-btn" class="btn-principal">GIRAR (1 ⚡)</button>
            <div style="font-size: 14px; margin-top: 10px;">⚡ Energía: <span id="energy-text">0/50</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <div id="timer-text" style="font-size: 12px; color: #aaa; margin-top: 5px;">Sincronizando...</div>
        </div>

        <div id="t2" class="tab">
            <h3>TAREAS Y TIENDA</h3>
            <div style="width: 100%; padding: 0 10px;">
                <div class="btn-secundario" id="task-wallet">
                    <span>🔗 Tarea: Conectar Wallet</span>
                    <b id="wallet-badge" style="color: var(--oro);">+10 ⚡</b>
                </div>
                <button class="btn-principal" id="video-ad-btn" style="background: #e91e63; margin: 10px 0;">🎬 Video (+1 Ticket)</button>
                <h4 style="color: var(--cyan-neon); margin: 15px 0 10px;">💎 TIENDA TON</h4>
                <button class="btn-secundario" data-pack="50" data-price="0.1"><span>Pack 50 Energía</span> <b>0.1 TON</b></button>
                <button class="btn-secundario" data-pack="120" data-price="0.2"><span>Pack 120 Energía</span> <b>0.2 TON</b></button>
                <h4 style="margin: 15px 0 10px;">🪙 CANJES</h4>
                <button class="btn-secundario" id="exchange-points-btn"><span>100 Puntos → +10 ⚡</span> <b>Canjear</b></button>
            </div>
        </div>

        <div id="t0" class="tab">
            <h3>🏆 TOP GLOBAL</h3>
            <div id="ranking-list" style="width:100%"></div>
        </div>

        <div id="t3" class="tab">
            <h3>📩 INBOX</h3>
            <div style="width:100%; padding: 0 10px;">
                <div style="background:white; color:#333; padding:15px; border-radius:15px; display:flex; align-items:center; margin-bottom:15px;">
                    <span style="font-size:30px; margin-right:15px;">🎁</span>
                    <div><b>Regalo de Bienvenida</b><br>+50 Energía aplicada.</div>
                </div>
                <div style="background:var(--bg-tarjeta); padding:20px; border-radius:15px; border: 1px solid rgba(255,255,255,0.1);">
                    <div style="font-size: 24px; margin-bottom: 10px;">👥 Referidos</div>
                    <div style="font-size: 14px; margin-bottom: 15px;">Invita amigos y gana 20 puntos por cada uno.</div>
                    <div style="font-size: 20px; font-weight: 800; color: var(--azul-ton);" id="ref-count">0 Amigos</div>
                    <button class="btn-principal" id="copy-ref-btn" style="margin-top:15px;">🔗 COPIAR LINK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn" data-tab="t0">🏆 TOP</div>
        <div class="nav-btn on" data-tab="t1">🎮 JUEGO</div>
        <div class="nav-btn" data-tab="t2">✅ TAREAS</div>
        <div class="nav-btn" data-tab="t3">📩 INBOX</div>
    </div>

    <script>
        // ========== CONFIGURACIÓN ==========
        // 🔴 ¡REEMPLAZA ESTO CON TUS CREDENCIALES DE FIREBASE!
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const MY_WALLET = "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj";
        const REGEN_TIME = 25 * 60 * 1000; // 25 minutos
        
        // Variables globales
        let db, tg;
        let pts = 0, tickets = 0, energiaActual = 0, lastSyncTime = Date.now();
        let walletBonus = false, referidos = 0, rotationActual = 0, isSpinning = false;
        let userId = "dev_user", firstName = "Jugador";
        let tonConnectUI;
        
        const PREMIOS = [
            { icono: '💎', color: '#030d17', valor: 50, tipo: 'pts' },
            { icono: '🎫', color: '#f59e0b', valor: 1, tipo: 'tkt' },
            { icono: '💰', color: '#030d17', valor: 100, tipo: 'pts' },
            { icono: '❌', color: '#1a2a3a', valor: 0, tipo: 'none' },
            { icono: '💎', color: '#030d17', valor: 200, tipo: 'pts' },
            { icono: '🏆', color: '#ff0000', valor: 5000, tipo: 'pts' },
            { icono: '💰', color: '#030d17', valor: 10, tipo: 'pts' },
            { icono: '❌', color: '#1a2a3a', valor: 0, tipo: 'none' }
        ];

        // ========== FUNCIONES AUXILIARES ==========
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.style.background = isError ? 'rgba(200,0,0,0.9)' : 'rgba(0,0,0,0.9)';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        async function saveData() {
            if (!db) return;
            try {
                await setDoc(doc(db, "jugadores", userId), { 
                    nombre: firstName, 
                    puntos: pts, 
                    tickets: tickets, 
                    energia: energiaActual, 
                    lastSeen: lastSyncTime, 
                    walletBonus: walletBonus, 
                    referidos: referidos 
                }, { merge: true });
            } catch(e) { 
                console.error("Error saving:", e); 
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts);
            document.getElementById('user-tickets').innerText = tickets;
            document.getElementById('energy-text').innerText = `${energiaActual}/50`;
            document.getElementById('energy-fill').style.width = `${(energiaActual/50)*100}%`;
            document.getElementById('username').innerText = firstName;
            document.getElementById('ref-count').innerText = `${referidos} Amigos`;
            if(walletBonus) document.getElementById('wallet-badge').innerHTML = "✅";
            
            const btn = document.getElementById('spin-btn');
            if(btn) btn.style.opacity = (energiaActual < 1 || isSpinning) ? "0.5" : "1";
        }

        async function loadData() {
            if (!db) return;
            const d = await getDoc(doc(db, "jugadores", userId));
            const ahora = Date.now();

            if (!d.exists()) {
                energiaActual = 50;
                lastSyncTime = ahora;
                await saveData();
            } else {
                const data = d.data();
                pts = data.puntos || 0;
                tickets = data.tickets || 0;
                walletBonus = data.walletBonus || false;
                referidos = data.referidos || 0;

                const transcurrido = ahora - (data.lastSeen || ahora);
                const ganada = Math.floor(transcurrido / REGEN_TIME);
                energiaActual = Math.min(50, (data.energia ?? 0) + ganada);
                lastSyncTime = ganada > 0 ? ahora - (transcurrido % REGEN_TIME) : (data.lastSeen || ahora);
            }
            updateUI();
        }

        async function startSpin() {
            if (isSpinning || energiaActual < 1) {
                if(energiaActual < 1) showToast("¡Sin energía! Espera a que recargue.");
                return;
            }

            isSpinning = true;
            energiaActual--;
            updateUI();
            
            if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            // Seleccionar premio (1% de probabilidad de jackpot)
            let idx = Math.random() < 0.01 ? 5 : [0,1,2,3,4,6,7][Math.floor(Math.random()*7)];
            
            // Calcular rotación para que el puntero apunte al sector correcto
            const sectorAngle = 45;
            const targetRotation = (360 - (idx * sectorAngle) - 22.5) % 360;
            rotationActual += (360 * 5) + targetRotation;
            document.getElementById('fortune-wheel').style.transform = `rotate(${rotationActual}deg)`;

            setTimeout(async () => {
                const p = PREMIOS[idx];
                let mensaje = `¡Ganaste ${p.valor} ${p.icono}!`;
                
                if(p.tipo === 'pts') {
                    pts += p.valor;
                } else if(p.tipo === 'tkt') {
                    tickets += p.valor;
                } else if(p.valor === 0) {
                    mensaje = "❌ ¡Sin premio! Vuelve a intentarlo.";
                }
                
                showToast(mensaje);
                isSpinning = false;
                await saveData();
                updateUI();
            }, 4000);
        }

        // ========== FUNCIONES DE TIENDA Y TAREAS ==========
        async function buyTON(amt, gain) {
            if (!tonConnectUI || !tonConnectUI.connected) {
                showToast("⚠️ Conecta tu wallet TON primero", true);
                return;
            }
            
            const tx = { 
                validUntil: Math.floor(Date.now()/1000) + 300, 
                messages: [{ 
                    address: MY_WALLET, 
                    amount: (amt * 1000000000).toString() 
                }] 
            };
            
            try {
                showToast("⏳ Enviando transacción...");
                await tonConnectUI.sendTransaction(tx);
                energiaActual = Math.min(50, energiaActual + gain);
                await saveData();
                updateUI();
                showToast(`✅ Compra exitosa! +${gain} ⚡`);
            } catch(e) { 
                console.error(e);
                showToast("❌ Transacción cancelada", true); 
            }
        }

        async function exchangePoints() {
            if (pts >= 100) {
                pts -= 100;
                energiaActual = Math.min(50, energiaActual + 10);
                await saveData();
                updateUI();
                showToast("🔄 Canje exitoso! +10 ⚡");
            } else {
                showToast("❌ Necesitas 100 puntos", true);
            }
        }

        function copyRefLink() {
            const botUsername = tg ? tg.initDataUnsafe?.user?.username : "tu_bot";
            const refLink = `https://t.me/${botUsername}?start=${userId}`;
            navigator.clipboard.writeText(refLink);
            showToast("✅ Link de referido copiado!");
        }

        function showVideoAd() {
            // Simulación de video (en producción usaría Telegram Ads o similar)
            showToast("🎬 Viendo anuncio...");
            setTimeout(async () => {
                tickets++;
                await saveData();
                updateUI();
                showToast("🎫 +1 Ticket!");
            }, 2000);
        }

        // ========== INICIALIZACIÓN ==========
        window.initApp = async function() {
            // Inicializar Telegram
            tg = window.Telegram.WebApp;
            if(tg) {
                tg.expand();
                tg.ready();
                const user = tg.initDataUnsafe?.user;
                if(user) {
                    userId = user.id.toString();
                    firstName = user.first_name || "Jugador";
                }
            }

            // Inicializar Firebase
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
            const { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            window.db = db; // Para debugging
            
            await loadData();
            
            // Inicializar TON Connect
            if(window.TON_CONNECT_UI) {
                tonConnectUI = new window.TON_CONNECT_UI.TonConnectUI({
                    manifestUrl: 'https://raw.githubusercontent.com/ton-connect/docs/main/public/manifest.json',
                    buttonRootId: 'ton-connect'
                });
                
                tonConnectUI.onStatusChange(async (wallet) => {
                    if (wallet && !walletBonus) {
                        energiaActual = Math.min(50, energiaActual + 10);
                        walletBonus = true;
                        await saveData();
                        updateUI();
                        showToast("🎉 Bono de Wallet cobrado! +10 ⚡");
                    }
                });
            }
            
            // Crear ruleta visual
            const wheel = document.getElementById('fortune-wheel');
            wheel.innerHTML = '';
            PREMIOS.forEach((p, i) => {
                const s = document.createElement('div');
                s.className = 'wheel-sector';
                s.style.backgroundColor = p.color;
                s.style.transform = `rotate(${i*45}deg) skewY(-45deg)`;
                const ic = document.createElement('div');
                ic.className = 'wheel-icon';
                ic.innerText = p.icono;
                s.appendChild(ic);
                wheel.appendChild(s);
            });
            
            // Configurar eventos
            document.getElementById('spin-btn').onclick = startSpin;
            document.getElementById('task-wallet').onclick = () => {
                if(tonConnectUI) tonConnectUI.openModal();
                else showToast("⚠️ TON Connect no disponible", true);
            };
            document.getElementById('video-ad-btn').onclick = showVideoAd;
            document.getElementById('exchange-points-btn').onclick = exchangePoints;
            document.getElementById('copy-ref-btn').onclick = copyRefLink;
            
            // Botones de tienda
            document.querySelectorAll('[data-pack]').forEach(btn => {
                btn.onclick = () => {
                    const gain = parseInt(btn.dataset.pack);
                    const price = parseFloat(btn.dataset.price);
                    buyTON(price, gain);
                };
            });
            
            // Navegación
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.onclick = () => {
                    const tabId = btn.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
                    document.getElementById(tabId).classList.add('active');
                    btn.classList.add('on');
                };
            });
            
            // Ranking en tiempo real
            const rankingQuery = query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(50));
            onSnapshot(rankingQuery, (snapshot) => {
                const listDiv = document.getElementById('ranking-list');
                listDiv.innerHTML = '';
                let i = 1;
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    listDiv.innerHTML += `<div class="btn-secundario"><span>#${i} ${data.nombre || 'Anon'}</span><b>${Math.floor(data.puntos || 0)} pts</b></div>`;
                    i++;
                });
            });
            
            // Loop de regeneración de energía
            setInterval(() => {
                if (energiaActual < 50) {
                    const ahora = Date.now();
                    const diff = ahora - lastSyncTime;
                    
                    if (diff >= REGEN_TIME) {
                        energiaActual++;
                        lastSyncTime += REGEN_TIME;
                        saveData();
                    }
                    
                    const restante = Math.floor((REGEN_TIME - diff) / 1000);
                    const m = Math.floor(restante / 60);
                    const s = restante % 60;
                    document.getElementById('timer-text').innerHTML = `⚡ +1 en ${m}:${s < 10 ? '0' : ''}${s}`;
                } else {
                    document.getElementById('timer-text').innerHTML = "⚡ Energía al máximo";
                }
                updateUI();
            }, 1000);
        };
        
        // Iniciar cuando cargue la página
        window.onload = initApp;
    </script>
</body>
                    </html>
