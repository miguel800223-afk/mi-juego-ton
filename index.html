<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-bg: #031525; --ton-blue: #0088cc; --text-color: #ffffff; --card-border: rgba(255, 255, 255, 0.1); --futuristic-glow: #00f2fe; }
        body { background-color: var(--primary-bg); color: var(--text-color); text-align: center; font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid var(--card-border); }
        #username { background: rgba(0, 136, 204, 0.2); padding: 6px 15px; border-radius: 20px; font-size: 13px; color: var(--ton-blue); font-weight: 600; }
        .main { flex: 1; position: relative; width: 100%; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; }
        .tab.active { display: flex !important; }
        .scroll-container { width: 90%; max-height: 85%; overflow-y: auto; padding: 20px 0; }
        .rank-item { display: grid; grid-template-columns: 40px 1fr auto; padding: 12px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 12px; text-align: left; }
        #coin-container { width: 200px; height: 200px; cursor: pointer; touch-action: manipulation; transition: transform 0.1s; }
        #coin-container:active { transform: scale(0.95); }
        .energy-container { width: 80%; margin-top: 20px; }
        .energy-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0088cc, #00f2fe); transition: width 0.2s; }
        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 11px; cursor: pointer; }
        .nav-btn.on { opacity: 1; color: var(--futuristic-glow); border-top: 3px solid var(--futuristic-glow); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; margin: 8px 0; color: #fff; cursor: pointer; }
        .btn-ads { background: linear-gradient(90deg, #6f42c1, #a176ff); }
        .btn-upgrade { background: #f7a80e; }
        .floating-text { position: absolute; color: white; font-weight: 800; font-size: 28px; pointer-events: none; animation: moveUp 0.6s forwards; }
        @keyframes moveUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>
    <div class="header">
        <div id="username">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <div class="scroll-container" id="ranking">Cargando ranking...</div>
        </div>

        <div id="t1" class="tab active">
            <div id="score-container"><h1><span id="score">0</span></h1></div>
            <div id="coin-container" onclick="handleCoinClick(event)">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#0088cc" stroke="#00f2fe" stroke-width="3"/></svg>
            </div>
            <div class="energy-container">
                <div style="margin-bottom: 5px;"><span id="energy-text">500/500</span> ⚡</div>
                <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            </div>
        </div>

        <div id="t2" class="tab">
            <div class="scroll-container">
                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;">
                    <button class="btn btn-ads" onclick="triggerAd()">🎬 VIDEO (+200 ENERGÍA)</button>
                    <button class="btn btn-upgrade" onclick="buyUpgrade()">MEJORAR CLIC (0.05 TON)</button>
                    <button class="btn btn-upgrade" style="background:#3a7bd5" onclick="buyAuto()">AUTO-CLICK (0.2 TON)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="b0" class="nav-btn" onclick="ir('t0','b0')">🏆 TOP</div>
        <div id="b1" class="nav-btn on" onclick="ir('t1','b1')">⚡ MINAR</div>
        <div id="b2" class="nav-btn" onclick="ir('t2','b2')">✅ TAREAS</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I", authDomain: "mytonclicker.firebaseapp.com", projectId: "mytonclicker", storageBucket: "mytonclicker.firebasestorage.app", messagingSenderId: "847124098754", appId: "1:847124098754:web:17c7f23ae15acdfef2155b" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.expand();

        let pts = 0, nivelClic = 1, energiaActual = 500, maxEnergia = 500, tieneAuto = false;
        let adController = null;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "local_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Jugador";

        // --- NAVEGACIÓN (Reparada) ---
        window.ir = (tabId, btnId) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById(btnId).classList.add('on');
        };

        // --- JUEGO ---
        window.handleCoinClick = (e) => {
            if (energiaActual < nivelClic) return;
            pts += nivelClic; energiaActual -= nivelClic;
            updateUI();
            createPop(e.clientX, e.clientY, `+${nivelClic}`);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };

        window.triggerAd = async () => {
            if (!adController) return tg.showAlert("Anuncios cargando...");
            try {
                const res = await adController.show();
                if (res.done) {
                    energiaActual = Math.min(energiaActual + 200, maxEnergia);
                    updateUI();
                    await saveData();
                    tg.showAlert("¡Energía recargada!");
                }
            } catch(e) { tg.showAlert("No hay videos"); }
        };

        // Placeholder para funciones de compra (Necesitas lógica TON aquí)
        window.buyUpgrade = () => tg.showAlert("Función de pago TON próximamente");
        window.buyAuto = () => tg.showAlert("Función de pago TON próximamente");

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts).toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(energiaActual)}/${maxEnergia}`;
            document.getElementById('energy-fill').style.width = `${(energiaActual/maxEnergia)*100}%`;
        }

        function createPop(x, y, txt) {
            const f = document.createElement("div"); f.className = "floating-text"; f.innerText = txt;
            f.style.left = x + "px"; f.style.top = y + "px";
            document.body.appendChild(f); setTimeout(() => f.remove(), 600);
        }

        async function saveData() {
            try {
                await setDoc(doc(db, "jugadores", userId), { 
                    nombre: firstName, puntos: pts, nivelClic, autoclicker: tieneAuto, 
                    energia: energiaActual, lastSeen: serverTimestamp() 
                }, { merge: true });
            } catch (e) {}
        }

        async function loadData() {
            document.getElementById('username').innerText = firstName;
            const d = await getDoc(doc(db, "jugadores", userId));
            if (d.exists()) {
                const data = d.data();
                pts = data.puntos || 0;
                nivelClic = data.nivelClic || 1;
                tieneAuto = data.autoclicker || false;
                energiaActual = data.energia ?? 500;
            }
            updateUI();
        }

        // --- INICIO ---
        window.onload = async () => {
            if (window.Adsgram) adController = window.Adsgram.init({ blockId: "27310" });
            if (window.TON_CONNECT_UI) new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://miguel800223-afk.github.io/mi-juego-ton/tonconnect-manifest.json', buttonRootId: 'ton-connect' });
            await loadData();
        };

        setInterval(() => {
            if (tieneAuto) pts += 0.5;
            if (energiaActual < maxEnergia) energiaActual = Math.min(energiaActual + 1, maxEnergia);
            updateUI();
        }, 1000);

        setInterval(saveData, 20000);

        // Ranking Real-Time
        onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(10)), (s) => {
            const container = document.getElementById('ranking');
            container.innerHTML = "<h3 style='margin-bottom:15px'>🏆 TOP LÍDERES</h3>";
            let i = 1;
            s.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `<div class="rank-item"><div>#${i}</div><div>${d.nombre || 'Anon'}</div><b>${Math.floor(d.puntos||0).toLocaleString()}</b></div>`;
                i++;
            });
        });
    </script>
</body>
</html>
