<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker Pro - Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-bg: #031525; --ton-blue: #0088cc; --text-color: #ffffff; 
            --card-border: rgba(255, 255, 255, 0.1); --futuristic-glow: #00f2fe; 
            --accent-gold: #f59e0b; --purple-inbox: #8c5af5;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--primary-bg); color: var(--text-color); 
            text-align: center; font-family: 'Poppins', sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--card-border); }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; }
        .tab.active { display: flex; }

        /* RANKING ESTILO ELITE */
        .ranking-container { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .ranking-scroll { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; width: 100%; }
        .rank-card { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 15px; background: rgba(255,255,255,0.05); 
            margin-bottom: 8px; border-radius: 12px; border: 1px solid var(--card-border);
        }
        .my-pos-fixed { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: var(--ton-blue); padding: 15px; font-weight: 800;
            display: flex; justify-content: space-between; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 10;
        }

        /* RULETA */
        #wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        #fortune-wheel { 
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #1a2a3a; 
            box-shadow: 0 0 20px var(--ton-blue); transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1);
        }

        /* BOTONES */
        .btn-main { width: 85%; padding: 15px; border-radius: 30px; border: none; background: linear-gradient(180deg, var(--ton-blue), #005588); color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin: 10px 0; }
        .energy-bar-bg { width: 80%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 5px auto; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--ton-blue), var(--futuristic-glow)); transition: width 0.3s; }

        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 10px; color: white; cursor: pointer; }
        .nav-btn.on { opacity: 1; color: var(--futuristic-glow); border-top: 3px solid var(--futuristic-glow); }
    </style>
</head>
<body>

    <div class="header">
        <div id="username">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <div class="ranking-container">
                <h3 style="margin: 15px 0; color: var(--accent-gold);">🏆 TOP 100 MUNDIAL</h3>
                <div class="ranking-scroll" id="ranking-list">Cargando ranking...</div>
                <div class="my-pos-fixed" id="my-rank-card">
                    <span>ESTÁS EN POSICIÓN:</span>
                    <span id="my-rank-number">#?</span>
                </div>
            </div>
        </div>

        <div id="t1" class="tab active">
            <div style="display: flex; gap: 20px; margin-top: 10px;">
                <div style="font-size: 1.2rem;">💰 <span id="score">0</span></div>
                <div style="font-size: 1.2rem; color: var(--accent-gold);">🎫 <span id="user-tickets">0</span></div>
            </div>
            <div id="wheel-container">
                <div style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--futuristic-glow); z-index: 10;"></div>
                <img id="fortune-wheel" src="https://i.imgur.com/vHqY7pT.png">
            </div>
            <button class="btn-main" id="spin-btn" onclick="startSpin()">GIRAR (10 ⚡)</button>
            <div style="font-size: 12px;">⚡ <span id="energy-text">500/500</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
        </div>

        <div id="t2" class="tab">
            <h3 style="margin-top: 20px;">MISIONES</h3>
            <button class="btn-main" style="background: var(--purple-inbox); width: 90%;" onclick="triggerAd()">🎬 VER VIDEO (+2 TICKETS)</button>
        </div>

        <div id="t3" class="tab">
            <h3 style="margin-top: 20px;">📩 BUZÓN</h3>
            <div id="inbox-list" style="width: 90%;">Sin mensajes nuevos.</div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn" onclick="showTab('t0', this)">🏆 TOP</div>
        <div class="nav-btn on" onclick="showTab('t1', this)">🎮 JUEGO</div>
        <div class="nav-btn" onclick="showTab('t2', this)">✅ TAREAS</div>
        <div class="nav-btn" onclick="showTab('t3', this)">📩 INBOX</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "TU_API_KEY", authDomain: "TU_PROYECTO.firebaseapp.com", projectId: "TU_PROYECTO", storageBucket: "TU_PROYECTO.appspot.com", messagingSenderId: "TU_ID", appId: "TU_APP_ID" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.expand();

        let pts = 0, tickets = 0, energiaActual = 500, girando = false, currentRot = 0;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Jugador";

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('on');
        };

        window.startSpin = async () => {
            if (girando || energiaActual < 10) return;
            girando = true; energiaActual -= 10; updateUI();
            
            const wheel = document.getElementById('fortune-wheel');
            const addRot = (360 * 5) + Math.floor(Math.random() * 360);
            currentRot += addRot;
            wheel.style.transform = `rotate(${currentRot}deg)`;
            tg.HapticFeedback.impactOccurred('heavy');

            setTimeout(() => {
                girando = false;
                pts += 100; // Ejemplo premio fijo
                saveData(); updateUI();
                tg.showAlert("¡Has ganado 100 puntos!");
            }, 4000);
        };

        window.triggerAd = () => {
            if (!window.Adsgram) return;
            const AdController = window.Adsgram.init({ blockId: "27310" });
            AdController.show().then(res => { if(res.done) { tickets += 2; saveData(); updateUI(); } });
        };

        async function saveData() {
            await setDoc(doc(db, "jugadores", userId), { 
                nombre: firstName, puntos: pts, tickets: tickets, energia: energiaActual, lastSeen: serverTimestamp() 
            }, { merge: true });
        }

        window.onload = async () => {
            document.getElementById('username').innerText = firstName;
            const d = await getDoc(doc(db, "jugadores", userId));
            if(d.exists()) {
                const data = d.data();
                pts = data.puntos || 0; tickets = data.tickets || 0; energiaActual = data.energia ?? 500;
            }
            updateUI();
            loadRanking(); // Cargar el Top 100
        };

        // RANKING TOP 100 + MI POSICIÓN
        function loadRanking() {
            // Pedimos los 100 mejores
            const q = query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(100));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('ranking-list');
                list.innerHTML = "";
                let i = 1;
                let foundMe = false;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = doc.id === userId;
                    if(isMe) {
                        document.getElementById('my-rank-number').innerText = `#${i}`;
                        foundMe = true;
                    }

                    list.innerHTML += `
                        <div class="rank-card" style="${isMe ? 'border: 2px solid var(--futuristic-glow); background: rgba(0,136,204,0.2);' : ''}">
                            <span><b>#${i}</b> ${data.nombre}</span>
                            <b>${Math.floor(data.puntos).toLocaleString()}</b>
                        </div>`;
                    i++;
                });

                if(!foundMe) document.getElementById('my-rank-number').innerText = "+100";
            });
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts).toLocaleString();
            document.getElementById('user-tickets').innerText = tickets;
            document.getElementById('energy-text').innerText = `${Math.floor(energiaActual)}/500`;
            document.getElementById('energy-fill').style.width = `${(energiaActual/500)*100}%`;
        }

        setInterval(() => { if(energiaActual < 500) { energiaActual += 1; updateUI(); } }, 3000);
    </script>
</body>
</html>
