<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Ton Clicker - Pro Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://telegram.org/js/adsgram.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0f1a; color: #ffffff; font-family: 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 153, 255, 0.3); position: sticky; top: 0; z-index: 100; }
        .username { font-weight: 700; font-size: 14px; background: rgba(0, 153, 255, 0.2); padding: 6px 14px; border-radius: 20px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
        .stats-container { display: flex; gap: 10px; justify-content: center; padding: 15px; }
        .stat-card { background: linear-gradient(135deg, rgba(0, 153, 255, 0.2), rgba(0, 153, 255, 0.05)); padding: 10px 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(0, 153, 255, 0.3); flex: 1; }
        .stat-value { font-size: 24px; font-weight: 800; }
        .stat-label { font-size: 10px; opacity: 0.7; }
        .wheel-wrapper { display: flex; justify-content: center; margin: 20px 0; position: relative; }
        .wheel-container { position: relative; width: 300px; height: 300px; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 40px solid #ffcc00; z-index: 10; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
        canvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px rgba(0, 153, 255, 0.3); }
        .btn-primary { width: 85%; padding: 16px; margin: 10px auto; display: block; background: linear-gradient(135deg, #0099ff, #0066cc); border: none; border-radius: 50px; color: white; font-weight: 800; font-size: 18px; cursor: pointer; transition: transform 0.1s; box-shadow: 0 5px 20px rgba(0, 153, 255, 0.4); }
        .btn-primary:active { transform: scale(0.96); }
        .btn-primary.disabled { opacity: 0.5; pointer-events: none; }
        .btn-secondary { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 15px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; }
        .energy-section { width: 90%; margin: 15px auto; }
        .energy-bar-bg { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.15); border-radius: 20px; overflow: hidden; }
        #energy-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ff9900); transition: width 0.3s; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(0, 0, 0, 0.9); padding: 10px 0; border-top: 1px solid rgba(0, 153, 255, 0.3); padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-btn { flex: 1; text-align: center; opacity: 0.5; font-size: 12px; cursor: pointer; }
        .nav-btn.on { opacity: 1; color: #0099ff; }
        .tab { display: none; padding: 15px; padding-bottom: 100px; }
        .tab.active { display: block; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #000; color: #ffcc00; padding: 10px 20px; border-radius: 50px; border: 1px solid #ffcc00; z-index: 1000; animation: fade 2s forwards; }
        @keyframes fade { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loadingOverlay { position: fixed; inset: 0; background: #0a0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #exchange-points-btn { cursor: pointer; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div style="border: 4px solid #333; border-top-color: #0099ff; width: 40px; height: 40px; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 15px;">Conectando a la red TON...</p>
    </div>

    <div class="header">
        <div class="username" id="username">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div id="tab-game" class="tab active">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">PUNTOS</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="user-tickets">0</div>
                <div class="stat-label">TICKETS</div>
            </div>
        </div>
        <div class="wheel-wrapper">
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="300" height="300"></canvas>
            </div>
        </div>
        <button id="spin-btn" class="btn-primary">🎡 GIRAR (1 ⚡)</button>
        <div class="energy-section">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                <span>Energía</span>
                <span id="energy-text">0/50</span>
            </div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <div id="timer-text" style="text-align: center; font-size: 11px; margin-top: 5px; color: #aaa;"></div>
        </div>
    </div>

    <div id="tab-tasks" class="tab">
        <h3 style="margin-bottom: 15px;">Tareas</h3>
        <button class="btn-secondary" id="video-ad-btn">🎬 Ver Video (+1 Ticket)</button>
        <button class="btn-secondary" id="exchange-points-btn">💱 100 Puntos -> 10 ⚡</button>
    </div>

    <div id="tab-ranking" class="tab">
        <h3 style="margin-bottom: 15px;">Ranking Global</h3>
        <div id="ranking-list">Próximamente...</div>
    </div>

    <div class="nav">
        <div class="nav-btn on" data-tab="game">🎮<br>Juego</div>
        <div class="nav-btn" data-tab="tasks">✅<br>Tareas</div>
        <div class="nav-btn" data-tab="ranking">🏆<br>Top</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I",
            authDomain: "mytonclicker.firebaseapp.com",
            projectId: "mytonclicker",
            storageBucket: "mytonclicker.firebasestorage.app",
            messagingSenderId: "847124098754",
            appId: "1:847124098754:web:17c7f23ae15acdfef2155b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const tg = window.Telegram.WebApp;
        
        const REGEN_TIME = 25 * 60 * 1000; // 25 minutos
        const ADSGRAM_BLOCK_ID = "26422";
        const SEGMENTS = [
            { name: "+50", value: 50, type: "points", color: "#FF6B6B", icon: "💎" },
            { name: "+1 🎫", value: 1, type: "ticket", color: "#4ECDC4", icon: "🎫" },
            { name: "+100", value: 100, type: "points", color: "#45B7D1", icon: "💰" },
            { name: "0", value: 0, type: "none", color: "#333", icon: "❌" },
            { name: "+200", value: 200, type: "points", color: "#FFEAA7", icon: "💎" },
            { name: "+500", value: 500, type: "points", color: "#DDA0DD", icon: "🏆" },
            { name: "+10", value: 10, type: "points", color: "#98D8C8", icon: "💰" },
            { name: "0", value: 0, type: "none", color: "#444", icon: "🍀" }
        ];

        let puntos = 0, tickets = 0, energia = 50, userId = "guest", userName = "Jugador", isSpinning = false;

        function showToast(m) {
            const t = document.createElement('div'); 
            t.className = 'toast'; 
            t.textContent = m;
            document.body.appendChild(t); 
            setTimeout(() => t.remove(), 2000);
        }

        async function save() {
            if (userId === "guest") return;
            try {
                await db.collection("jugadores").doc(userId).set({
                    puntos, tickets, energia, lastSeen: Date.now(), nombre: userName
                }, { merge: true });
            } catch(e) { console.log("save error", e); }
        }

        function updateUI() {
            document.getElementById('score').textContent = Math.floor(puntos);
            document.getElementById('user-tickets').textContent = tickets;
            document.getElementById('energy-text').textContent = `${energia}/50`;
            document.getElementById('energy-fill').style.width = `${(energia/50)*100}%`;
            document.getElementById('username').textContent = userName;
            const btn = document.getElementById('spin-btn');
            if(btn) btn.classList.toggle('disabled', energia < 1 || isSpinning);
        }

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const anglePerSegment = (Math.PI * 2) / SEGMENTS.length;
            ctx.clearRect(0,0,300,300);
            SEGMENTS.forEach((s, i) => {
                const start = i * anglePerSegment;
                ctx.beginPath(); 
                ctx.fillStyle = s.color; 
                ctx.moveTo(150,150);
                ctx.arc(150,150,150,start,start+anglePerSegment); 
                ctx.fill();
                ctx.save(); 
                ctx.translate(150,150); 
                ctx.rotate(start + anglePerSegment/2);
                ctx.fillStyle = "white"; 
                ctx.font = "bold 12px Arial";
                ctx.fillText(s.icon, 100, 0); 
                ctx.fillText(s.name, 100, 15); 
                ctx.restore();
            });
        }

        async function spinWheel() {
            if (isSpinning || energia < 1) return;
            isSpinning = true; 
            energia--; 
            updateUI();
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const randomIndex = Math.floor(Math.random() * SEGMENTS.length);
            const segmentAngle = 360 / SEGMENTS.length;
            const deg = 3600 + (randomIndex * segmentAngle);
            const canvas = document.getElementById('wheelCanvas');
            canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0, 1)";
            canvas.style.transform = `rotate(-${deg}deg)`;

            setTimeout(async () => {
                const prize = SEGMENTS[randomIndex];
                if (prize.type === "ticket") tickets += prize.value;
                else if (prize.type === "points") puntos += prize.value;
                showToast(prize.value > 0 ? `🎉 Ganaste ${prize.name}` : "😅 Sigue intentando");
                isSpinning = false; 
                canvas.style.transition = "none";
                canvas.style.transform = `rotate(-${deg % 360}deg)`;
                await save(); 
                updateUI();
            }, 4000);
        }

        function showVideoAd() {
            if (!window.Adsgram) {
                showToast("Publicidad no disponible");
                return;
            }
            const AdController = window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID });
            AdController.show().then(() => {
                tickets++; 
                save(); 
                updateUI(); 
                showToast("🎫 +1 Ticket!");
            }).catch(() => showToast("❌ Video no completado"));
        }

        function exchangePoints() {
            if (puntos >= 100) {
                puntos -= 100;
                energia = Math.min(50, energia + 10);
                save();
                updateUI();
                showToast("⚡ +10 Energía!");
            } else {
                showToast("❌ Necesitas 100 puntos");
            }
        }

        async function init() {
            // Expander Telegram WebApp
            if (tg) {
                tg.expand();
                tg.ready(); // IMPORTANTE: avisa a Telegram que cargó
                if (tg.initDataUnsafe?.user) {
                    userId = tg.initDataUnsafe.user.id.toString();
                    userName = tg.initDataUnsafe.user.first_name || "Jugador";
                }
            }

            try {
                await auth.signInAnonymously();
                const doc = await db.collection("jugadores").doc(userId).get();
                if (doc.exists) {
                    const d = doc.data();
                    puntos = d.puntos || 0;
                    tickets = d.tickets || 0;
                    const lastSeen = d.lastSeen || Date.now();
                    const minutesPassed = (Date.now() - lastSeen) / (60 * 1000);
                    const rec = Math.floor(minutesPassed / 25);
                    energia = Math.min(50, (d.energia || 50) + rec);
                } else {
                    tickets = 3; // Tickets iniciales gratis
                }
            } catch(e) {
                console.error("Firebase error:", e);
                showToast("Error de conexión");
            }

            drawWheel();
            updateUI();
            
            // Botones
            document.getElementById('spin-btn').onclick = spinWheel;
            const adBtn = document.getElementById('video-ad-btn');
            if(adBtn) adBtn.onclick = showVideoAd;
            const exchangeBtn = document.getElementById('exchange-points-btn');
            if(exchangeBtn) exchangeBtn.onclick = exchangePoints;
            
            document.getElementById('loadingOverlay').style.display = 'none';

            // Navegación
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.onclick = () => {
                    document.querySelectorAll('.tab, .nav-btn').forEach(x => x.classList.remove('active', 'on'));
                    document.getElementById(`tab-${b.dataset.tab}`).classList.add('active');
                    b.classList.add('on');
                };
            });

            // Regeneración de energía
            setInterval(() => { 
                if(energia < 50) { 
                    energia++; 
                    updateUI(); 
                    save(); 
                } 
            }, REGEN_TIME);
        }

        window.onload = init;
    </script>
</body>
                    </html>
