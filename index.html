<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker - Icon Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-oscuro: #030d17; --bg-tarjeta: rgba(255,255,255,0.05);
            --azul-ton: #0088cc; --cyan-neon: #00f2fe; --texto: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1); --oro: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-oscuro); color: var(--texto); font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--card-border); }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; padding: 15px; overflow-y: auto; }
        .tab.active { display: flex; }
        
        /* RULETA ARREGLADA */
        #wheel-container { position: relative; width: 280px; height: 280px; margin: 15px auto; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--oro); z-index: 100; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        
        #fortune-wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 6px solid #1a2a3a; box-shadow: 0 0 25px rgba(0, 136, 204, 0.3); 
            position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); 
            overflow: hidden; list-style: none; padding: 0; margin: 0;
        }
        
        .wheel-sector { 
            position: absolute; width: 50%; height: 50%; 
            top: 0; right: 0; transform-origin: 0% 100%; 
            display: flex; align-items: center; justify-content: center; 
        }
        
        /* Ajuste de los iconos para que no desaparezcan */
        .wheel-icon { 
            position: absolute; left: 30px; bottom: 60px; 
            font-size: 24px; z-index: 5;
            display: block; width: 40px; text-align: center;
        }

        .btn-principal { width: 90%; padding: 12px; border-radius: 25px; border: none; background: linear-gradient(180deg, var(--azul-ton), #005588); color: white; font-weight: 800; cursor: pointer; margin: 8px 0; }
        .btn-secundario { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid var(--card-border); background: var(--bg-tarjeta); color: white; margin-bottom: 10px; font-size: 13px; text-align: left; }
        .energy-bar-bg { width: 90%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffee00); transition: width 0.5s; }
        
        .rank-card { display: flex; justify-content: space-between; width: 100%; padding: 12px; background: var(--bg-tarjeta); margin-bottom: 8px; border-radius: 12px; font-size: 14px; }
        .rank-me { border: 2px solid var(--azul-ton); background: rgba(0, 136, 204, 0.15); }
        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 10px; color: white; cursor: pointer;}
        .nav-btn.on { opacity: 1; color: var(--azul-ton); border-top: 3px solid var(--azul-ton); }
    </style>
</head>
<body>

    <div class="header">
        <div id="username" style="font-weight: 800;">...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <h3 style="color: var(--oro);">🏆 RANKING</h3>
            <div id="ranking-list" style="width:100%"></div>
        </div>

        <div id="t1" class="tab active">
            <div style="display: flex; gap: 20px; margin: 10px 0; font-weight: 800;">
                <div>💰 <span id="score">0</span></div>
                <div>🎫 <span id="user-tickets">0</span></div>
            </div>
            <div id="wheel-container">
                <div class="pointer"></div>
                <div id="fortune-wheel"></div>
            </div>
            <button class="btn-principal" id="spin-btn" onclick="startSpin()">GIRAR (1 ⚡)</button>
            <div style="font-size: 13px; margin-top: 10px; font-weight: 600;">⚡ Energía: <span id="energy-text">0/50</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <div id="timer-text" style="font-size: 11px; color: #aaa; margin-top: 5px;">...</div>
        </div>

        <div id="t2" class="tab">
            <h3>TAREAS Y TIENDA</h3>
            <button class="btn-principal" style="background: #e91e63; margin-bottom: 20px;" onclick="triggerAd()">🎬 VIDEO (+1 TICKET)</button>
            <div style="width: 100%; padding: 0 10px;">
                <h4 style="color: var(--cyan-neon);">🛒 COMPRAS TON</h4>
                <button class="btn-secundario" onclick="buyPackTON(0.2, 100)">⚡ Pack 100 Energía <span style="float:right">0.2 TON</span></button>
                <h4 style="margin-top: 15px;">🪙 PUNTOS</h4>
                <button class="btn-secundario" onclick="buyEnergyPoints()">100 Puntos → +10 Energía ⚡</button>
            </div>
        </div>

        <div id="t3" class="tab">
            <h2>📩 INBOX</h2>
            <div id="inbox-list" style="width: 100%;">
                <div class="card-inbox" style="background:white; color: #333; padding: 15px; border-radius: 12px; display: flex; align-items: center;">
                    <div style="background:#8c5af5; color:white; border-radius:50%; width:35px; height:35px; display:flex; align-items:center; justify-content:center; margin-right:15px;">👥</div>
                    <div><b>Referidos</b><br><span id="referral-count">0 referidos</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn" onclick="showTab('t0', this)">🏆 TOP</div>
        <div class="nav-btn on" onclick="showTab('t1', this)">🎮 JUEGO</div>
        <div class="nav-btn" onclick="showTab('t2', this)">✅ TAREAS</div>
        <div class="nav-btn" onclick="showTab('t3', this)">📩 INBOX</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- CONFIGURACIÓN ---
        const MY_WALLET = "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj";
        const firebaseConfig = { apiKey: "AIza...", projectId: "...", appId: "..." };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let pts = 0, tickets = 0, energiaActual = 0, maxEnergia = 50, referidos = 0;
        let lastSyncTime = Date.now(), rotationActual = 0;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Jugador";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://tu-dominio.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const PREMIOS = [
            { tipo: 'puntos', valor: 50, color: '#030d17', icono: '💎' },
            { tipo: 'tickets', valor: 1, color: '#f59e0b', icono: '🎫' },
            { tipo: 'puntos', valor: 100, color: '#030d17', icono: '💎' },
            { tipo: 'nada', valor: 0, color: '#1a2a3a', icono: '❌' },
            { tipo: 'puntos', valor: 200, color: '#030d17', icono: '💎' },
            { tipo: 'jackpot', valor: 5000, color: '#ff0000', icono: '🏆' },
            { tipo: 'puntos', valor: 10, color: '#030d17', icono: '💎' },
            { tipo: 'nada', valor: 0, color: '#1a2a3a', icono: '❌' }
        ];

        window.buyPackTON = async (amount, energyGain) => {
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 60,
                messages: [{ address: MY_WALLET, amount: (amount * 1000000000).toString() }]
            };
            try {
                await tonConnectUI.sendTransaction(transaction);
                energiaActual += energyGain; 
                saveData(); updateUI();
                tg.showAlert(`¡Compra de ${energyGain} Energía exitosa!`);
            } catch (e) { tg.showAlert("Pago cancelado."); }
        };

        function updateEnergyLogic() {
            const ms = 25 * 60 * 1000;
            const ahora = Date.now();
            if (energiaActual < maxEnergia) {
                const ganada = Math.floor((ahora - lastSyncTime) / ms);
                if (ganada > 0) {
                    energiaActual = Math.min(maxEnergia, energiaActual + ganada);
                    lastSyncTime = ahora - ((ahora - lastSyncTime) % ms);
                    saveData();
                }
                const f = ms - ((ahora - lastSyncTime) % ms);
                document.getElementById('timer-text').innerText = `+1⚡ en: ${Math.floor(f/60000)}:${Math.floor((f%60000)/1000).toString().padStart(2,'0')}`;
            } else {
                document.getElementById('timer-text').innerText = energiaActual > maxEnergia ? "¡Acumulando energía extra!" : "Energía al máximo";
            }
            updateUI();
        }

        window.startSpin = () => {
            if (energiaActual < 1) return tg.showAlert("Sin energía");
            energiaActual--;
            let index = Math.random() < 0.01 ? 5 : [0,1,2,3,4,6,7][Math.floor(Math.random()*7)];
            rotationActual += (360 * 8) + (360 - (index * 45) - 22.5);
            document.getElementById('fortune-wheel').style.transform = `rotate(${rotationActual}deg)`;
            setTimeout(() => {
                const p = PREMIOS[index];
                if(p.tipo === 'puntos' || p.tipo === 'jackpot') pts += p.valor;
                if(p.tipo === 'tickets') tickets += p.valor;
                saveData();
            }, 4000);
        };

        window.buyEnergyPoints = () => {
            if(pts >= 100) { pts -= 100; energiaActual += 10; saveData(); updateUI(); }
            else tg.showAlert("No tienes 100 puntos.");
        };

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts).toLocaleString();
            document.getElementById('user-tickets').innerText = tickets;
            document.getElementById('energy-text').innerText = `${energiaActual}/50`;
            const fill = document.getElementById('energy-fill');
            fill.style.width = `${Math.min((energiaActual/50)*100, 100)}%`;
            fill.style.background = energiaActual > 50 ? "var(--cyan-neon)" : "linear-gradient(90deg, #ffcc00, #ffee00)";
        }

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('on');
        };

        async function saveData() {
            await setDoc(doc(db, "jugadores", userId), { nombre: firstName, puntos: pts, tickets: tickets, energia: energiaActual, lastSeen: lastSyncTime }, { merge: true });
        }

        window.onload = async () => {
            document.getElementById('username').innerText = firstName;
            dibujarRuleta();
            const d = await getDoc(doc(db, "jugadores", userId));
            if(d.exists()) {
                const dat = d.data(); pts=dat.puntos||0; tickets=dat.tickets||0; 
                energiaActual=dat.energia??10; lastSyncTime=dat.lastSeen||Date.now();
            }
            setInterval(updateEnergyLogic, 1000);
            onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(50)), (s) => {
                const l = document.getElementById('ranking-list'); l.innerHTML = "";
                let i = 1; s.forEach(docSnap => {
                    const isMe = docSnap.id === userId;
                    l.innerHTML += `<div class="rank-card ${isMe?'rank-me':''}"><span>#${i} ${docSnap.data().nombre}</span><b>💰 ${Math.floor(docSnap.data().puntos)}</b></div>`;
                    i++;
                });
            });
        };

        function dibujarRuleta() {
            const wheel = document.getElementById('fortune-wheel');
            wheel.innerHTML = ""; // Limpiar antes de dibujar
            PREMIOS.forEach((p, i) => {
                const sector = document.createElement('div');
                sector.className = 'wheel-sector';
                sector.style.backgroundColor = p.color;
                // SkewY(-45) crea el ángulo de 45 grados para 8 sectores
                sector.style.transform = `rotate(${i * 45}deg) skewY(-45deg)`;
                
                const iconWrap = document.createElement('div');
                iconWrap.className = 'wheel-icon';
                iconWrap.innerText = p.icono;
                // Re-invertimos la deformación para que el icono se vea recto
                iconWrap.style.transform = `skewY(45deg) rotate(22.5deg)`;
                
                sector.appendChild(iconWrap);
                wheel.appendChild(sector);
            });
        }
    </script>
</body>
</html>
