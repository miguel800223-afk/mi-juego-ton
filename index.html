<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #031525; --secondary-bg: #061e33; --ton-blue: #0088cc;
            --accent-gold: #f7a80e; --accent-silver: #c0c0c0; --accent-bronze: #cd7f32;
            --text-color: #ffffff; --card-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03); --font-main: 'Poppins', sans-serif;
            --futuristic-glow: #00f2fe; 
        }

        body {
            background-color: var(--primary-bg);
            background-image: radial-gradient(circle at center, var(--secondary-bg) 0%, var(--primary-bg) 100%);
            color: var(--text-color); text-align: center; font-family: var(--font-main);
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        .header {
            height: 65px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border); z-index: 100;
        }

        #username { 
            background: rgba(0, 136, 204, 0.1); padding: 6px 15px; border-radius: 20px; 
            font-size: 13px; font-weight: 600; border: 1px solid rgba(0, 136, 204, 0.3); 
            color: var(--ton-blue); min-width: 50px;
        }

        .main { flex: 1; position: relative; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .active { display: flex !important; }

        .scroll-container { width: 92%; max-height: 90%; overflow-y: auto; padding-top: 10px; margin: 0 auto; padding-bottom: 20px;}
        .scroll-container::-webkit-scrollbar { display: none; }

        /* RANKING */
        .rank-item { 
            display: grid; grid-template-columns: 50px 1fr auto; 
            align-items: center; padding: 12px 18px; 
            background: rgba(255,255,255,0.03); margin-bottom: 8px;
            border-radius: 16px; border: 1px solid var(--card-border);
            text-align: left;
        }
        .rank-number { font-weight: 800; font-size: 16px; text-align: center; }
        .gold { border-color: var(--accent-gold); }
        .silver { border-color: var(--accent-silver); }
        .bronze { border-color: var(--accent-bronze); }

        /* ENERGÍA */
        .energy-container { width: 85%; margin-top: 15px; text-align: left; }
        .energy-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; border: 1px solid rgba(0, 242, 254, 0.1); overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0088cc, #00f2fe); box-shadow: 0 0 10px var(--futuristic-glow); transition: width 0.5s; }

        #score-container { 
            background: rgba(255,255,255,0.05); padding: 10px 40px; border-radius: 25px; margin-bottom: 10px;
            border: 1px solid var(--card-border);
        }
        h1 { font-size: 50px; margin: 0; text-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }
        
        #coin-container {
            width: 210px; height: 210px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
            animation: floatFuturistic 4s infinite ease-in-out; position: relative;
        }
        #coin-icon { width: 100%; height: 100%; filter: drop-shadow(0 0 20px var(--futuristic-glow)); }

        @keyframes floatFuturistic { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* NAV */
        .nav { height: 75px; display: flex; background: rgba(4, 16, 29, 0.98); border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; font-size: 10px; color: white; transition: 0.3s; position: relative; }
        .nav-btn.on { opacity: 1; color: var(--futuristic-glow); }
        .nav-btn.on::before { content: ''; position: absolute; top: 0; width: 35px; height: 3px; background: var(--futuristic-glow); }

        /* FLOATING TEXT */
        .floating-text { position: absolute; color: white; font-weight: 800; font-size: 32px; pointer-events: none; animation: moveUpFade 0.7s forwards; text-shadow: 0 0 10px var(--futuristic-glow); z-index: 1000; }
        @keyframes moveUpFade { 0% { opacity: 0; transform: translateY(0) scale(0.5); } 20% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0; transform: translateY(-120px); } }
        
        /* BOTONES */
        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--card-border); text-align: left;}
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; margin: 6px 0; cursor: pointer; color: #fff; font-family: var(--font-main); font-size: 13px;}
        .btn-upgrade { background: linear-gradient(90deg, #f7a80e, #ffc107); color: #4a3100; }
        .btn-auto { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        .btn-invite { background: linear-gradient(90deg, #28a745, #34ce57); }
        .btn-mission { background: linear-gradient(90deg, #6f42c1, #8e65e6); }
        .btn-completed { background: #333 !important; color: #777 !important; opacity: 0.6; pointer-events: none; }
        .section-label { color: var(--accent-gold); font-weight: 800; font-size: 12px; letter-spacing: 1px; margin-bottom: 8px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div id="username">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <div class="scroll-container">
                <span class="section-label">🏆 TOP LÍDERES</span>
                <div id="ranking">Cargando lista...</div>
            </div>
        </div>

        <div id="t1" class="tab active">
            <div id="score-container"><h1 id="score">0</h1></div>
            <div id="coin-container" onclick="clickCoin(event)">
                <svg id="coin-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="#00f2fe" stroke-width="2" fill="rgba(0,242,254,0.1)"/>
                    <path d="M50 20V80M20 50H80" stroke="#00f2fe" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="50" cy="50" r="15" fill="#00f2fe">
                        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>
            <div class="energy-container">
                <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:bold; color:var(--futuristic-glow); margin-bottom: 5px;">
                    <span>⚡ Energía</span> <span id="energy-text">500/500</span>
                </div>
                <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            </div>
        </div>

        <div id="t2" class="tab">
            <div class="scroll-container">
                <span class="section-label">📈 MEJORAS TECNOLÓGICAS</span>
                <div class="card">
                    <button class="btn btn-upgrade" onclick="comprarMultiClic()">MEJORAR CLIC (LV <span id="lv-clic">1</span>) - 0.05 TON</button>
                    <button id="btn-autoclicker" class="btn btn-auto" onclick="comprarAutoClicker()">AUTO-MINADO (+5/s) - 0.2 TON</button>
                </div>
                
                <span class="section-label">👥 MISIONES DE COMUNIDAD</span>
                <div class="card">
                    <button class="btn btn-invite" onclick="invitar()">INVITAR AMIGO (+2500 💎)</button>
                    <button id="btn-mision-canal" class="btn btn-mission" onclick="mision('canal')">UNIRSE AL CANAL (+500 💎)</button>
                    <button id="btn-mision-grupo" class="btn btn-mission" onclick="mision('grupo')">UNIRSE AL GRUPO (+500 💎)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="b0" class="nav-btn" onclick="ir('t0','b0')"><span>🏆</span><span>TOP</span></div>
        <div id="b1" class="nav-btn on" onclick="ir('t1','b1')"><span>⚡</span><span>MINAR</span></div>
        <div id="b2" class="nav-btn" onclick="ir('t2','b2')"><span>✅</span><span>TAREAS</span></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = { apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I", authDomain: "mytonclicker.firebaseapp.com", projectId: "mytonclicker", storageBucket: "mytonclicker.firebasestorage.app", messagingSenderId: "847124098754", appId: "1:847124098754:web:17c7f23ae15acdfef2155b" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id.toString() : "local";
        const firstName = user ? user.first_name : "Jugador";
        const refBy = tg.initDataUnsafe?.start_param;

        document.getElementById('username').innerText = firstName;

        let pts = 0, nivelClic = 1, energiaActual = 500, maxEnergia = 500, tieneAuto = false;
        let lastClickTime = 0, regenCounter = 0;

        const tonUI = new TON_CONNECT_UI.TonConnectUI({ 
            manifestUrl: 'https://miguel800223-afk.github.io/mi-juego-ton/tonconnect-manifest.json', 
            buttonRootId: 'ton-connect' 
        });

        async function load() {
            const d = await getDoc(doc(db, "jugadores", userId));
            if (d.exists()) {
                const data = d.data();
                pts = data.puntos || 0;
                nivelClic = data.nivelClic || 1;
                tieneAuto = data.autoclicker || false;
                if (data.mision_canal) setMissionUI('btn-mision-canal');
                if (data.mision_grupo) setMissionUI('btn-mision-grupo');
                if (tieneAuto) setAutoUI();
            } else {
                if (refBy && refBy !== userId) {
                    await setDoc(doc(db, "jugadores", refBy), { puntos: increment(2500) }, { merge: true });
                    pts = 2500;
                }
                await setDoc(doc(db, "jugadores", userId), { nombre: firstName, puntos: pts, nivelClic: 1 });
            }
            document.getElementById('lv-clic').innerText = nivelClic;
            updateDisplay();
            iniciarRegen();
        }

        function iniciarRegen() {
            setInterval(() => {
                if (tieneAuto) { pts += 5; updateDisplay(); }
                regenCounter++;
                if (regenCounter >= 3) {
                    if (energiaActual < maxEnergia) { energiaActual++; updateEnergyUI(); }
                    regenCounter = 0;
                }
                if (new Date().getSeconds() % 20 === 0) saveAll();
            }, 1000);
        }

        window.clickCoin = (e) => {
            const now = Date.now();
            if (now - lastClickTime < 80 || energiaActual < nivelClic) return;
            lastClickTime = now;
            pts += nivelClic; energiaActual -= nivelClic;
            updateDisplay(); updateEnergyUI();
            createPop(e.clientX, e.clientY, `+${nivelClic}`);
            if (navigator.vibrate) navigator.vibrate(35);
        };

        function updateDisplay() { document.getElementById('score').innerText = pts.toLocaleString(); }
        function updateEnergyUI() {
            document.getElementById('energy-text').innerText = `${energiaActual}/${maxEnergia}`;
            document.getElementById('energy-fill').style.width = `${(energiaActual/maxEnergia)*100}%`;
        }

        window.ir = (t,b) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('on'));
            document.getElementById(t).classList.add('active');
            document.getElementById(b).classList.add('on');
        };

        function createPop(x, y, txt) {
            const f = document.createElement("div"); f.className = "floating-text"; f.innerText = txt;
            f.style.left = (x - 20) + "px"; f.style.top = (y - 40) + "px";
            document.body.appendChild(f); setTimeout(() => f.remove(), 700);
        }

        window.comprarMultiClic = async () => {
            try {
                await tonUI.sendTransaction({ validUntil: Math.floor(Date.now()/1000)+60, messages: [{ address: "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj", amount: "50000000" }] });
                nivelClic++; document.getElementById('lv-clic').innerText = nivelClic;
                await setDoc(doc(db, "jugadores", userId), { nivelClic: nivelClic }, { merge: true });
            } catch(e) {}
        };

        window.comprarAutoClicker = async () => {
            try {
                await tonUI.sendTransaction({ validUntil: Math.floor(Date.now()/1000)+60, messages: [{ address: "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj", amount: "200000000" }] });
                tieneAuto = true; setAutoUI();
                await setDoc(doc(db, "jugadores", userId), { autoclicker: true }, { merge: true });
            } catch(e) {}
        };

        window.invitar = () => {
            const link = `https://t.me/SuperTonClicker_bot?start=${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=¡Únete a la minería del futuro!`);
        };

        window.mision = async (tipo) => {
            const url = tipo === 'canal' ? "https://t.me/TuCanal" : "https://t.me/TuGrupo";
            tg.openTelegramLink(url);
            setTimeout(async () => {
                pts += 500; updateDisplay();
                const field = tipo === 'canal' ? { mision_canal: true } : { mision_grupo: true };
                setMissionUI(tipo === 'canal' ? 'btn-mision-canal' : 'btn-mision-grupo');
                await setDoc(doc(db, "jugadores", userId), { puntos: pts, ...field }, { merge: true });
            }, 3000);
        };

        function setMissionUI(id) { const b = document.getElementById(id); b.innerText = "COMPLETADO ✅"; b.className = "btn btn-completed"; }
        function setAutoUI() { const b = document.getElementById('btn-autoclicker'); b.innerText = "AUTO-MINADO ACTIVO ⚡"; b.className = "btn btn-completed"; }
        async function saveAll() { await setDoc(doc(db, "jugadores", userId), { puntos: pts, lastSeen: serverTimestamp() }, { merge: true }); }

        onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(10)), (s) => {
            const l = document.getElementById('ranking'); l.innerHTML = "";
            let i = 1;
            s.forEach(x => {
                const data = x.data();
                let trophy = i; let extraClass = "";
                if (i === 1) { trophy = "🥇"; extraClass = "gold"; }
                else if (i === 2) { trophy = "🥈"; extraClass = "silver"; }
                else if (i === 3) { trophy = "🥉"; extraClass = "bronze"; }
                l.innerHTML += `<div class="rank-item ${extraClass}"><div class="rank-number">${trophy}</div><div>${data.nombre}</div><b style="color:var(--futuristic-glow)">${data.puntos.toLocaleString()}</b></div>`;
                i++;
            });
        });

        load();
    </script>
</body>
</html>
