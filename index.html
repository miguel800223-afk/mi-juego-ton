<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #031525; --secondary-bg: #061e33; --ton-blue: #0088cc;
            --accent-gold: #f7a80e; --accent-silver: #c0c0c0; --accent-bronze: #cd7f32;
            --text-color: #ffffff; --card-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03); --font-main: 'Poppins', sans-serif;
            --futuristic-glow: #00f2fe; 
        }
        body { background-color: var(--primary-bg); color: var(--text-color); text-align: center; font-family: var(--font-main); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 65px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0, 0, 0, 0.4); border-bottom: 1px solid var(--card-border); z-index: 100; }
        #username { background: rgba(0, 136, 204, 0.1); padding: 6px 15px; border-radius: 20px; font-size: 13px; color: var(--ton-blue); }
        .main { flex: 1; position: relative; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; }
        .active { display: flex !important; }
        .scroll-container { width: 92%; max-height: 90%; overflow-y: auto; margin: 0 auto; padding-bottom: 20px; }
        .rank-item { display: grid; grid-template-columns: 50px 1fr auto; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); margin-bottom: 8px; border-radius: 16px; border: 1px solid var(--card-border); text-align: left; }
        .energy-container { width: 85%; margin-top: 15px; }
        .energy-bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0088cc, #00f2fe); transition: width 0.3s; }
        #score-container { background: rgba(255,255,255,0.05); padding: 10px 40px; border-radius: 25px; margin-bottom: 10px; }
        h1 { font-size: 50px; margin: 0; }
        #coin-container { width: 210px; height: 210px; cursor: pointer; position: relative; }
        .nav { height: 75px; display: flex; background: rgba(4, 16, 29, 0.98); border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.4; font-size: 10px; color: white; }
        .nav-btn.on { opacity: 1; color: var(--futuristic-glow); border-top: 3px solid var(--futuristic-glow); }
        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--card-border); text-align: left;}
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; margin: 6px 0; cursor: pointer; color: #fff; }
        .btn-upgrade { background: linear-gradient(90deg, #f7a80e, #ffc107); }
        .btn-auto { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }
        .btn-ads { background: linear-gradient(90deg, #6f42c1, #a176ff); border: 1px solid #fff; }
        .floating-text { position: absolute; color: white; font-weight: 800; font-size: 32px; pointer-events: none; animation: moveUp 0.7s forwards; }
        @keyframes moveUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div class="header">
        <div id="username">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <div class="scroll-container">
                <div id="ranking">Cargando ranking...</div>
            </div>
        </div>

        <div id="t1" class="tab active">
            <div id="score-container"><h1 id="score">0</h1></div>
            <div id="coin-container" onclick="clickCoin(event)">
                <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#0088cc"/></svg>
            </div>
            <div class="energy-container">
                <span id="energy-text">500/500</span>
                <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            </div>
        </div>

        <div id="t2" class="tab">
            <div class="scroll-container">
                <div class="card">
                    <button class="btn btn-ads" onclick="showRewardAd()">🎬 VER VIDEO (+200 ENERGÍA)</button>
                    <button class="btn btn-upgrade" onclick="comprarMultiClic()">MEJORAR CLIC - 0.05 TON</button>
                    <button id="btn-autoclicker" class="btn btn-auto" onclick="comprarAutoClicker()">AUTO-MINADO - 0.2 TON</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="b0" class="nav-btn" onclick="ir('t0','b0')">🏆 TOP</div>
        <div id="b1" class="nav-btn on" onclick="ir('t1','b1')">⚡ MINAR</div>
        <div id="b2" class="nav-btn" onclick="ir('t2','b2')">✅ TAREAS</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyA2tERIcCyLoKo8U-Ue-wVJ9YYSz32MJ9I", authDomain: "mytonclicker.firebaseapp.com", projectId: "mytonclicker", storageBucket: "mytonclicker.firebasestorage.app", messagingSenderId: "847124098754", appId: "1:847124098754:web:17c7f23ae15acdfef2155b" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id.toString() : "local_user";
        const firstName = user ? user.first_name : "Jugador";

        // INICIALIZAR ADSGRAM CON TU ID
        const AdController = window.Adsgram.init({ blockId: "27310" });

        document.getElementById('username').innerText = firstName;
        let pts = 0, nivelClic = 1, energiaActual = 500, maxEnergia = 500, tieneAuto = false;

        const tonUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://miguel800223-afk.github.io/mi-juego-ton/tonconnect-manifest.json', buttonRootId: 'ton-connect' });

        // Función para cambiar de pestaña
        window.ir = (t, b) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('on'));
            document.getElementById(t).classList.add('active');
            document.getElementById(b).classList.add('on');
        };

        // Función de Clic
        window.clickCoin = (e) => {
            if (energiaActual < nivelClic) return;
            pts += nivelClic; energiaActual -= nivelClic;
            updateDisplay();
            createPop(e.clientX, e.clientY, `+${nivelClic}`);
            if (navigator.vibrate) navigator.vibrate(30);
        };

        // FUNCIÓN DEL ANUNCIO (RECOMPENSA)
        window.showRewardAd = async () => {
            try {
                const result = await AdController.show();
                if (result.done) {
                    energiaActual = Math.min(energiaActual + 200, maxEnergia);
                    updateDisplay();
                    tg.showAlert("¡Recibiste +200 de energía! ⚡");
                    saveData();
                }
            } catch (e) {
                tg.showAlert("No hay videos disponibles ahora.");
            }
        };

        function updateDisplay() {
            document.getElementById('score').innerText = pts.toLocaleString();
            document.getElementById('energy-text').innerText = `${energiaActual}/${maxEnergia}`;
            document.getElementById('energy-fill').style.width = `${(energiaActual/maxEnergia)*100}%`;
        }

        function createPop(x, y, txt) {
            const f = document.createElement("div"); f.className = "floating-text"; f.innerText = txt;
            f.style.left = x + "px"; f.style.top = y + "px";
            document.body.appendChild(f); setTimeout(() => f.remove(), 700);
        }

        async function saveData() {
            await setDoc(doc(db, "jugadores", userId), { puntos: pts, nivelClic, autoclicker: tieneAuto, lastSeen: serverTimestamp() }, { merge: true });
        }

        async function loadData() {
            const d = await getDoc(doc(db, "jugadores", userId));
            if (d.exists()) {
                const data = d.data();
                pts = data.puntos || 0;
                nivelClic = data.nivelClic || 1;
                tieneAuto = data.autoclicker || false;
            } else {
                await setDoc(doc(db, "jugadores", userId), { nombre: firstName, puntos: 0, nivelClic: 1 });
            }
            updateDisplay();
        }

        // Sistema de auto-minado y recuperación de energía
        setInterval(() => {
            if (tieneAuto) pts += 5;
            if (energiaActual < maxEnergia) energiaActual++;
            updateDisplay();
        }, 1000);

        // Ranking en tiempo real
        onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(10)), (s) => {
            const l = document.getElementById('ranking'); l.innerHTML = "🏆 TOP LÍDERES<br><br>";
            let i = 1;
            s.forEach(doc => {
                const d = doc.data();
                l.innerHTML += `<div class="rank-item"><div>#${i}</div><div>${d.nombre}</div><b>${(d.puntos||0).toLocaleString()}</b></div>`;
                i++;
            });
        });

        loadData();
    </script>
</body>
</html>
