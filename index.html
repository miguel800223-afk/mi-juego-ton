<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker - Full Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-oscuro: #030d17; --bg-tarjeta: rgba(255,255,255,0.05);
            --azul-ton: #0088cc; --cyan-neon: #00f2fe; --texto: #ffffff;
            --oro: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-oscuro); color: var(--texto); font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; padding: 15px; overflow-y: auto; }
        .tab.active { display: flex; }
        
        /* RULETA */
        #wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid var(--oro); z-index: 100; }
        #fortune-wheel { width: 100%; height: 100%; border-radius: 50%; border: 6px solid #1a2a3a; position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); overflow: hidden; }
        .wheel-sector { position: absolute; width: 50%; height: 50%; top: 0; right: 0; transform-origin: 0% 100%; display: flex; align-items: center; justify-content: center; }
        .wheel-icon { position: absolute; left: 18px; bottom: 40px; font-size: 24px; transform: skewY(45deg) rotate(22.5deg); }

        .btn-principal { width: 90%; padding: 14px; border-radius: 25px; border: none; background: linear-gradient(180deg, var(--azul-ton), #005588); color: white; font-weight: 800; cursor: pointer; margin: 8px 0; }
        .btn-secundario { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-tarjeta); color: white; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        
        .energy-bar-bg { width: 90%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
        #energy-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffee00); transition: width 0.5s; }
        
        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 10px; color: white; cursor: pointer;}
        .nav-btn.on { opacity: 1; color: var(--azul-ton); border-top: 3px solid var(--azul-ton); }
    </style>
</head>
<body>

    <div class="header">
        <div id="username" style="font-weight: 800;">...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t1" class="tab active">
            <div style="display: flex; gap: 20px; margin: 10px 0; font-size: 18px; font-weight: 800;">
                <div>💰 <span id="score">0</span></div>
                <div>🎫 <span id="user-tickets">0</span></div>
            </div>
            <div id="wheel-container">
                <div class="pointer"></div>
                <div id="fortune-wheel"></div>
            </div>
            <button class="btn-principal" onclick="startSpin()">GIRAR (1 ⚡)</button>
            <div style="font-size: 14px; margin-top: 10px;">⚡ Energía: <span id="energy-text">0/50</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <div id="timer-text" style="font-size: 11px; color: #aaa; margin-top: 5px;">Cargando...</div>
        </div>

        <div id="t2" class="tab">
            <h3>TAREAS Y TIENDA</h3>
            <div style="width: 100%; padding: 0 10px;">
                <div class="btn-secundario" id="task-wallet" onclick="tg.showAlert('¡Conecta tu wallet arriba para cobrar!')">
                    <span>🔗 Tarea: Conectar Wallet</span>
                    <b id="wallet-badge" style="color: var(--oro);">+10 ⚡</b>
                </div>
                <button id="btn-ad" class="btn-principal" style="background: #e91e63; margin: 10px 0;" onclick="showVideoAd()">
    🎬 Ver Video (+1 Ticket)
</button>
<div id="ad-status" style="font-size: 10px; color: #aaa; text-align: center; margin-top: -5px;"></div>

                
                <h4 style="color: var(--cyan-neon); margin: 15px 0 10px;">💎 TIENDA TON</h4>
                <button class="btn-secundario" onclick="buyTON(0.1, 50)"><span>Pack 50 Energía</span> <b>0.1 TON</b></button>
                <button class="btn-secundario" onclick="buyTON(0.2, 120)"><span>Pack 120 Energía</span> <b>0.2 TON</b></button>
                
                <h4 style="margin: 15px 0 10px;">🪙 CANJES</h4>
                <button class="btn-secundario" onclick="exchangePoints()"><span>100 Puntos → +10 ⚡</span> <b>Canjear</b></button>
            </div>
        </div>

        <div id="t0" class="tab">
            <h3>🏆 TOP GLOBAL</h3>
            <div id="ranking-list" style="width:100%"></div>
        </div>

        <div id="t3" class="tab">
            <h3>📩 INBOX</h3>
            <div style="width:100%; padding: 0 10px;">
                <div style="background:white; color:#333; padding:15px; border-radius:15px; display:flex; align-items:center; margin-bottom:15px;">
                    <span style="font-size:30px; margin-right:15px;">🎁</span>
                    <div><b>Regalo de Bienvenida</b><br>+50 Energía aplicada.</div>
                </div>
                
                <div style="background:var(--bg-tarjeta); padding:20px; border-radius:15px; border: 1px solid rgba(255,255,255,0.1);">
                    <div style="font-size: 24px; margin-bottom: 10px;">👥 Referidos</div>
                    <div style="font-size: 14px; margin-bottom: 15px;">Invita amigos y gana puntos extras.</div>
                    <div style="font-size: 20px; font-weight: 800; color: var(--azul-ton);" id="ref-count">0 Amigos</div>
                    <button class="btn-principal" onclick="copyRef()" style="margin-top:15px;">🔗 COPIAR LINK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn" onclick="showTab('t0', this)">🏆 TOP</div>
        <div class="nav-btn on" onclick="showTab('t1', this)">🎮 JUEGO</div>
        <div class="nav-btn" onclick="showTab('t2', this)">✅ TAREAS</div>
        <div class="nav-btn" onclick="showTab('t3', this)">📩 INBOX</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIza...", projectId: "...", appId: "..." };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        const MY_WALLET = "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj";

        let pts = 0, tickets = 0, energiaActual = 0, lastSyncTime = Date.now();
        let walletBonus = false, referidos = 0, rotationActual = 0;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Jugador";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://tu-sitio.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const PREMIOS = [
            { icono: '💎', color: '#030d17', valor: 50 },
            { icono: '🎫', color: '#f59e0b', valor: 1 },
            { icono: '💰', color: '#030d17', valor: 100 },
            { icono: '❌', color: '#1a2a3a', valor: 0 },
            { icono: '💎', color: '#030d17', valor: 200 },
            { icono: '🏆', color: '#ff0000', valor: 5000 },
            { icono: '💰', color: '#030d17', valor: 10 },
            { icono: '❌', color: '#1a2a3a', valor: 0 }
        ];

        async function loadData() {
            const d = await getDoc(doc(db, "jugadores", userId));
            if (!d.exists()) {
                energiaActual = 50; // REGALO INICIAL
                await setDoc(doc(db, "jugadores", userId), { nombre: firstName, puntos: 0, tickets: 0, energia: 50, lastSeen: Date.now(), walletBonus: false, referidos: 0 });
            } else {
                const data = d.data();
                pts = data.puntos || 0;
                tickets = data.tickets || 0;
                energiaActual = data.energia ?? 0;
                lastSyncTime = data.lastSeen || Date.now();
                walletBonus = data.walletBonus || false;
                referidos = data.referidos || 0;
            }
            updateUI();
        }

        window.buyTON = async (amt, gain) => {
            const tx = { validUntil: Math.floor(Date.now()/1000)+60, messages: [{ address: MY_WALLET, amount: (amt*1000000000).toString() }] };
            try {
                await tonConnectUI.sendTransaction(tx);
                energiaActual += gain; await saveData(); updateUI();
                tg.showAlert("✅ Compra exitosa!");
            } catch(e) { tg.showAlert("Cancelado"); }
        };

        window.exchangePoints = async () => {
            if(pts >= 100) { pts -= 100; energiaActual += 10; await saveData(); updateUI(); }
            else tg.showAlert("Faltan puntos");
        };

        window.copyRef = () => {
            navigator.clipboard.writeText(`https://t.me/TuBot?start=${userId}`);
            tg.showAlert("Link copiado!");
        };
        // Configuración de Adsgram
const AD_BLOCK_ID = "2642"; // Tu ID real

window.showVideoAd = async () => {
    const btn = document.getElementById('btn-ad');
    const status = document.getElementById('ad-status');
    
    // 1. Inicializar Adsgram
    const AdController = window.Adsgram.init({ blockId: AD_BLOCK_ID });

    try {
        // Bloquear botón temporalmente para evitar doble clic
        btn.disabled = true;
        btn.innerText = "CARGANDO...";

        const result = await AdController.show();
        
        if (result.done) {
            // RECOMPENSA
            tickets += 1;
            await saveData();
            updateUI();
            tg.showAlert("✅ ¡Felicidades! Has ganado 1 Ticket 🎫");
            
            // Iniciar cooldown de 30 segundos (opcional, ajusta según prefieras)
            iniciarCooldownAd(30);
        } else {
            tg.showAlert("⚠️ No terminaste el video, no hay recompensa.");
            btn.disabled = false;
            btn.innerText = "🎬 Ver Video (+1 Ticket)";
        }
    } catch (error) {
        console.error("Adsgram Error:", error);
        tg.showAlert("❌ No hay anuncios disponibles ahora.");
        btn.disabled = false;
        btn.innerText = "🎬 Ver Video (+1 Ticket)";
    }
};

function iniciarCooldownAd(segundos) {
    const btn = document.getElementById('btn-ad');
    let restante = segundos;
    
    const interval = setInterval(() => {
        btn.disabled = true;
        btn.innerText = `ESPERA (${restante}s)`;
        restante--;
        
        if (restante < 0) {
            clearInterval(interval);
            btn.disabled = false;
            btn.innerText = "🎬 Ver Video (+1 Ticket)";
        }
    }, 1000);
}


        window.startSpin = async () => {
            if (energiaActual < 1) return tg.showAlert("Sin energía");
            energiaActual--; updateUI();
            let idx = Math.random() < 0.01 ? 5 : [0,1,2,3,4,6,7][Math.floor(Math.random()*7)];
            rotationActual += (360 * 5) + (360 - (idx * 45) - 22.5);
            document.getElementById('fortune-wheel').style.transform = `rotate(${rotationActual}deg)`;
            setTimeout(async () => {
                const p = PREMIOS[idx];
                if(idx === 1) tickets += p.valor; else pts += p.valor;
                await saveData();
            }, 4000);
        };

        tonConnectUI.onStatusChange(async (w) => {
            if (w && !walletBonus) {
                energiaActual += 10; walletBonus = true;
                await saveData(); updateUI();
                tg.showAlert("¡Bono de Wallet cobrado! +10 ⚡");
            }
        });

        async function saveData() {
            await setDoc(doc(db, "jugadores", userId), { 
                nombre: firstName, puntos: pts, tickets: tickets, 
                energia: energiaActual, lastSeen: lastSyncTime, 
                walletBonus: walletBonus, referidos: referidos 
            }, { merge: true });
        }

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts);
            document.getElementById('user-tickets').innerText = tickets;
            document.getElementById('energy-text').innerText = `${energiaActual}/50`;
            document.getElementById('energy-fill').style.width = `${Math.min((energiaActual/50)*100, 100)}%`;
            document.getElementById('ref-count').innerText = `${referidos} Amigos`;
            document.getElementById('username').innerText = firstName;
            if(walletBonus) document.getElementById('wallet-badge').innerText = "✅";
        }

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('on');
        };

        window.onload = () => {
            const wheel = document.getElementById('fortune-wheel');
            PREMIOS.forEach((p, i) => {
                const s = document.createElement('div');
                s.className = 'wheel-sector'; s.style.backgroundColor = p.color;
                s.style.transform = `rotate(${i*45}deg) skewY(-45deg)`;
                const ic = document.createElement('div');
                ic.className = 'wheel-icon'; ic.innerText = p.icono;
                s.appendChild(ic); wheel.appendChild(s);
            });
            loadData();
            setInterval(() => {
                if(energiaActual < 50) {
                    let now = Date.now();
                    if(now - lastSyncTime >= 25*60*1000) {
                        energiaActual++; lastSyncTime += 25*60*1000;
                        saveData(); updateUI();
                    }
                }
            }, 10000);
            
            onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(20)), (s) => {
                const l = document.getElementById('ranking-list'); l.innerHTML = "";
                let i = 1; s.forEach(d => {
                    l.innerHTML += `<div class="btn-secundario"><span>#${i} ${d.data().nombre}</span><b>${Math.floor(d.data().puntos)}</b></div>`;
                    i++;
                });
            });
        };
    </script>
</body>
</html>
