<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Ton Clicker - Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-oscuro: #030d17; --bg-tarjeta: rgba(255,255,255,0.05);
            --azul-ton: #0088cc; --cyan-neon: #00f2fe; --texto: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1); --oro: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-oscuro); color: var(--texto); font-family: 'Poppins', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--card-border); }
        .main { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; position: absolute; top: 0; padding: 15px; overflow-y: auto; }
        .tab.active { display: flex; }
        
        /* RULETA - CORRECCIÓN DE ICONOS */
        #wheel-container { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid var(--oro); z-index: 100; }
        
        #fortune-wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 8px solid #1a2a3a; box-shadow: 0 0 30px rgba(0, 136, 204, 0.3); 
            position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.2, 1); 
            overflow: hidden;
        }
        
        .wheel-sector { 
            position: absolute; width: 50%; height: 50%; 
            top: 0; right: 0; transform-origin: 0% 100%; 
        }
        
        .wheel-icon { 
            position: absolute; 
            left: 20px; /* Movido más al centro */
            bottom: 40px; 
            font-size: 26px; 
            display: block; width: 50px; text-align: center;
        }

        .btn-principal { width: 90%; padding: 14px; border-radius: 25px; border: none; background: linear-gradient(180deg, var(--azul-ton), #005588); color: white; font-weight: 800; cursor: pointer; margin: 8px 0; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4); }
        .btn-secundario { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid var(--card-border); background: var(--bg-tarjeta); color: white; margin-bottom: 10px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        
        .energy-bar-bg { width: 90%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ffee00); transition: width 0.5s; }
        
        .nav { height: 70px; display: flex; background: #04101d; border-top: 1px solid var(--card-border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5; font-size: 10px; color: white; cursor: pointer;}
        .nav-btn.on { opacity: 1; color: var(--azul-ton); border-top: 3px solid var(--azul-ton); }
    </style>
</head>
<body>

    <div class="header">
        <div id="username" style="font-weight: 800;">Cargando...</div>
        <div id="ton-connect"></div>
    </div>

    <div class="main">
        <div id="t0" class="tab">
            <h3 style="color: var(--oro);">🏆 TOP PLAYERS</h3>
            <div id="ranking-list" style="width:100%"></div>
        </div>

        <div id="t1" class="tab active">
            <div style="display: flex; gap: 20px; margin: 10px 0; font-size: 18px; font-weight: 800;">
                <div>💰 <span id="score">0</span></div>
                <div>🎫 <span id="user-tickets">0</span></div>
            </div>
            <div id="wheel-container">
                <div class="pointer"></div>
                <div id="fortune-wheel"></div>
            </div>
            <button class="btn-principal" id="spin-btn" onclick="startSpin()">GIRAR (1 ⚡)</button>
            <div style="font-size: 14px; margin-top: 10px; font-weight: 600;">⚡ Energía: <span id="energy-text">0/50</span></div>
            <div class="energy-bar-bg"><div id="energy-fill"></div></div>
            <div id="timer-text" style="font-size: 11px; color: #aaa; margin-top: 5px;">...</div>
        </div>

        <div id="t2" class="tab">
            <h3>🎁 MISIONES</h3>
            <div style="width: 100%; padding: 0 10px;">
                <div id="wallet-task" class="btn-secundario" style="background: rgba(0, 242, 254, 0.1); border-color: var(--cyan-neon);">
                    <span>🔗 Conectar Wallet (Premio)</span>
                    <b id="wallet-status">+10 ⚡</b>
                </div>
                
                <button class="btn-principal" style="background: #e91e63; margin: 15px 0;" onclick="triggerAd()">🎬 Ver Video (+1 TICKET)</button>
                
                <h4 style="color: var(--oro);">🛒 SHOP</h4>
                <button class="btn-secundario" onclick="buyPackTON(0.1, 50)"><span>Pack Inicial</span> <span>0.1 TON</span></button>
            </div>
        </div>

        <div id="t3" class="tab">
            <h2>📩 INBOX</h2>
            <div id="inbox-list" style="width: 100%;">
                <div class="card-inbox" style="background:white; color: #333; padding: 15px; border-radius: 12px; display: flex; align-items: center; margin-bottom: 10px;">
                    <div style="background:var(--azul-ton); color:white; border-radius:50%; width:35px; height:35px; display:flex; align-items:center; justify-content:center; margin-right:15px;">🎁</div>
                    <div><b>Bono de Bienvenida</b><br><span>+50 Energía gratis aplicada</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-btn" onclick="showTab('t0', this)">🏆 TOP</div>
        <div class="nav-btn on" onclick="showTab('t1', this)">🎮 JUEGO</div>
        <div class="nav-btn" onclick="showTab('t2', this)">✅ TAREAS</div>
        <div class="nav-btn" onclick="showTab('t3', this)">📩 INBOX</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const MY_WALLET = "UQBtAljw2oszCrCJhx2zt4g6IyHIPReHbWZ_bPnE_aaZTdHj";
        const firebaseConfig = { apiKey: "AIza...", projectId: "...", appId: "..." }; // Usa tus datos
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;

        let pts = 0, tickets = 0, energiaActual = 0, maxEnergia = 50;
        let lastSyncTime = Date.now(), rotationActual = 0, walletBonusClaimed = false;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "dev_user";
        const firstName = tg.initDataUnsafe?.user?.first_name || "Jugador";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://tu-dominio.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        const PREMIOS = [
            { icono: '💎', color: '#030d17', valor: 50 },
            { icono: '🎫', color: '#f59e0b', valor: 1 },
            { icono: '💰', color: '#030d17', valor: 100 },
            { icono: '❌', color: '#1a2a3a', valor: 0 },
            { icono: '💎', color: '#030d17', valor: 200 },
            { icono: '🏆', color: '#ff0000', valor: 5000 },
            { icono: '💰', color: '#030d17', valor: 10 },
            { icono: '❌', color: '#1a2a3a', valor: 0 }
        ];

        // --- LÓGICA DE CARGA INICIAL Y TAREAS ---
        window.onload = async () => {
            document.getElementById('username').innerText = firstName;
            dibujarRuleta();
            
            const d = await getDoc(doc(db, "jugadores", userId));
            if(!d.exists()) {
                // PRIMERA VEZ: REGALO 50 ENERGÍA
                energiaActual = 50;
                pts = 0; tickets = 0;
                tg.showAlert("¡Bienvenido! Te regalamos 50 de energía inicial.");
                saveData();
            } else {
                const dat = d.data();
                pts = dat.puntos || 0;
                tickets = dat.tickets || 0;
                energiaActual = dat.energia ?? 0;
                lastSyncTime = dat.lastSeen || Date.now();
                walletBonusClaimed = dat.walletBonus || false;
            }

            // Monitorear conexión de Wallet para el premio de +10
            tonConnectUI.onStatusChange(wallet => {
                if (wallet && !walletBonusClaimed) {
                    energiaActual += 10;
                    walletBonusClaimed = true;
                    tg.showAlert("¡Wallet conectada! +10 Energía de regalo.");
                    saveData();
                    document.getElementById('wallet-status').innerText = "✅ COBRADO";
                }
            });

            setInterval(updateEnergy, 1000);
            loadRanking();
        };

        function updateEnergy() {
            const ms = 25 * 60 * 1000;
            const ahora = Date.now();
            if (energiaActual < maxEnergia) {
                const ganada = Math.floor((ahora - lastSyncTime) / ms);
                if (ganada > 0) {
                    energiaActual = Math.min(maxEnergia, energiaActual + ganada);
                    lastSyncTime = ahora - ((ahora - lastSyncTime) % ms);
                    saveData();
                }
                const f = ms - ((ahora - lastSyncTime) % ms);
                document.getElementById('timer-text').innerText = `Recarga en: ${Math.floor(f/60000)}:${Math.floor((f%60000)/1000).toString().padStart(2,'0')}`;
            } else {
                document.getElementById('timer-text').innerText = "Energía a tope";
            }
            updateUI();
        }

        window.startSpin = () => {
            if (energiaActual < 1) return tg.showAlert("Sin energía");
            energiaActual--;
            let index = Math.random() < 0.01 ? 5 : [0,1,2,3,4,6,7][Math.floor(Math.random()*7)];
            rotationActual += (360 * 8) + (360 - (index * 45) - 22.5);
            document.getElementById('fortune-wheel').style.transform = `rotate(${rotationActual}deg)`;
            setTimeout(() => {
                const p = PREMIOS[index];
                if(index !== 3 && index !== 7) {
                    if(index === 1) tickets += p.valor; else pts += p.valor;
                    tg.showAlert(`¡Ganaste ${p.valor}!`);
                }
                saveData();
            }, 4000);
        };

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(pts);
            document.getElementById('user-tickets').innerText = tickets;
            document.getElementById('energy-text').innerText = `${energiaActual}/50`;
            document.getElementById('energy-fill').style.width = `${Math.min((energiaActual/50)*100, 100)}%`;
            if(walletBonusClaimed) document.getElementById('wallet-status').innerText = "✅ COBRADO";
        }

        async function saveData() {
            await setDoc(doc(db, "jugadores", userId), { 
                nombre: firstName, puntos: pts, tickets: tickets, 
                energia: energiaActual, lastSeen: lastSyncTime, walletBonus: walletBonusClaimed 
            }, { merge: true });
        }

        function dibujarRuleta() {
            const wheel = document.getElementById('fortune-wheel');
            wheel.innerHTML = "";
            PREMIOS.forEach((p, i) => {
                const sector = document.createElement('div');
                sector.className = 'wheel-sector';
                sector.style.backgroundColor = p.color;
                sector.style.transform = `rotate(${i * 45}deg) skewY(-45deg)`;
                
                const iconWrap = document.createElement('div');
                iconWrap.className = 'wheel-icon';
                iconWrap.innerText = p.icono;
                iconWrap.style.transform = `skewY(45deg) rotate(22.5deg)`;
                
                sector.appendChild(iconWrap);
                wheel.appendChild(sector);
            });
        }

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('on');
        };

        function loadRanking() {
            onSnapshot(query(collection(db, "jugadores"), orderBy("puntos", "desc"), limit(20)), (s) => {
                const l = document.getElementById('ranking-list'); l.innerHTML = "";
                let i = 1; s.forEach(docSnap => {
                    l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:var(--bg-tarjeta); margin-bottom:5px; border-radius:10px;">
                        <span>#${i} ${docSnap.data().nombre}</span><b>${Math.floor(docSnap.data().puntos)}</b>
                    </div>`;
                    i++;
                });
            });
        }
    </script>
</body>
</html>
